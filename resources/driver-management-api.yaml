  schemas:
    StartSessionRequestDTO:
      type: object
      description: Request to start a driver session. userId and driverId are not accepted in the request body.
      properties:
        lastKnownLocation:
          $ref: '#/components/schemas/LocationSnapshotDTO'
      additionalProperties: false

    StartSessionResponseDTO:
      type: object
      properties:
        sessionId:
          type: string
          example: driver_123_Session_abc
      additionalProperties: false

    EndSessionResponseDTO:
      type: object
      properties:
        sessionId:
          type: string
          example: session_20260702_000001
        userId:
          type: string
          example: user_789
        driverId:
          type: string
          example: driver_456
        startedAt:
          type: string
          format: date-time
          example: '2026-07-02T15:00:00-03:00'
        endedAt:
          type: string
          format: date-time
          example: '2026-07-02T22:10:00-03:00'
        sessionStatus:
          $ref: '#/components/schemas/SessionStatus'
      additionalProperties: false

    InternalDriverActiveSessionRequest:
      type: object
      required:
        - driverUserId
      properties:
        driverUserId:
          type: string
          description: Driver user id from usermanagement-profile-ms / Cognito subject.
          example: user_789
      additionalProperties: false

    InternalDriverActiveSessionResponse:
      type: object
      required:
        - driverUserId
        - hasActiveSession
      properties:
        driverUserId:
          type: string
          example: user_789
        hasActiveSession:
          type: boolean
          description: True when the driver user currently has an ACTIVE driver session.
          example: true
        sessionId:
          type: string
          nullable: true
          example: session_20260702_000001
        driverId:
          type: string
          nullable: true
          example: driver_456
        sessionStatus:
          type: string
          nullable: true
          enum:
            - ACTIVE
            - ENDED
            - CANCELLED
          example: ACTIVE
        currentStatus:
          type: string
          nullable: true
          enum:
            - IDLE
            - EN_ROUTE
            - BUSY
            - ON_BREAK
          example: IDLE
        startedAt:
          type: string
          format: date-time
          nullable: true
          example: '2026-07-02T15:00:00-03:00'
        lastUpdatedAt:
          type: string
          format: date-time
          nullable: true
          example: '2026-07-02T15:15:01-03:00'
      additionalProperties: false

    UpdateOrderFulfillmentStatusRequest:
      type: object
      description: Request payload compatible with ordermanagement-fulfilment-ms status update. driverUserId is accepted for compatibility but ignored; this service forwards the authenticated JWT subject.
      required:
        - deduplicationKey
        - newStatus
      properties:
        deduplicationKey:
          type: string
          description: Idempotency key for this status update operation.
          example: driver-session-123:OrderFulfilment_12345:IN_TRANSIT
        imageUrls:
          type: array
          description: Proof image URLs. Pickup statuses append pickup proof images; delivered statuses append dropoff proof images.
          items:
            type: string
            format: uri
        driverUserId:
          type: string
          nullable: true
          deprecated: true
          description: Ignored by driver-management-ms. The forwarded value is derived from the JWT subject.
          example: user_789
        receivedBy:
          type: string
          nullable: true
          description: Recipient name for completed delivery.
          example: John Customer
        newStatus:
          $ref: '#/components/schemas/FulfillmentStatus'
        trackingEvent:
          $ref: '#/components/schemas/UpdateTrackingEventRequest'
      additionalProperties: false

    UpdateTrackingEventRequest:
      type: object
      description: Tracking event details supplied by a driver during a status update.
      properties:
        location:
          $ref: '#/components/schemas/FulfillmentLocationDouble'
        statusMessage:
          type: string
          nullable: true
          description: Driver-entered tracking note or status message.
          example: Package is in transit.
      additionalProperties: false

    UpdateOrderFulfillmentPickedUpRequest:
      type: object
      description: Request payload for marking an assigned order fulfilment as picked up.
      required:
        - deduplicationKey
        - pickupTime
        - location
        - imageUrls
      properties:
        deduplicationKey:
          type: string
          description: Idempotency key for this pickup update operation.
          example: driver-session-123:OrderFulfilment_12345:PICKED_UP
        pickupTime:
          type: string
          format: date-time
          description: Timestamp when the pickup occurred.
          example: '2026-07-05T12:45:00Z'
        location:
          $ref: '#/components/schemas/FulfillmentLocation'
        imageUrls:
          type: array
          minItems: 1
          description: Pickup proof image URLs.
          items:
            type: string
            format: uri
        driverNotes:
          type: string
          nullable: true
          description: Optional driver pickup notes.
          example: Picked up from reception desk.
      additionalProperties: false

    UpdateOrderFulfillmentDeliveredRequest:
      type: object
      description: Request payload for marking an assigned order fulfilment as delivered.
      required:
        - deduplicationKey
        - dropoffTime
        - location
        - imageUrls
        - signatureStatus
      properties:
        deduplicationKey:
          type: string
          description: Idempotency key for this delivered update operation.
          example: driver-session-123:OrderFulfilment_12345:DELIVERED
        dropoffTime:
          type: string
          format: date-time
          description: Timestamp when the dropoff occurred.
          example: '2026-07-05T13:25:00Z'
        location:
          $ref: '#/components/schemas/FulfillmentLocation'
        imageUrls:
          type: array
          minItems: 1
          description: Dropoff proof image URLs.
          items:
            type: string
            format: uri
        driverNotes:
          type: string
          nullable: true
          description: Optional driver dropoff notes.
          example: Delivered to reception desk.
        signatureStatus:
          $ref: '#/components/schemas/SignatureStatus'
        signature:
          $ref: '#/components/schemas/SignatureDetails'
      additionalProperties: false

    FulfillmentLocation:
      type: object
      properties:
        latitude:
          type: number
          format: double
          example: 44.6488
        longitude:
          type: number
          format: double
          example: -63.5752
      additionalProperties: false

    FulfillmentLocationDouble:
      type: object
      properties:
        latitude:
          type: number
          format: double
          example: 44.6488
        longitude:
          type: number
          format: double
          example: -63.5752
      additionalProperties: false

    SignatureDetails:
      type: object
      properties:
        signedByName:
          type: string
          nullable: true
          example: Jane Doe
        signedByRelationship:
          $ref: '#/components/schemas/SignerRelationship'
        signatureImageUrl:
          type: string
          nullable: true
          format: uri
          example: https://cdn.example.com/signatures/signature-1.png
        signatureImageObjectKey:
          type: string
          nullable: true
          example: signatures/signature-1.png
        signedAt:
          type: string
          nullable: true
          format: date-time
          example: '2026-07-05T13:24:30Z'
        capturedByDriverId:
          type: string
          nullable: true
          example: driver-user-123
        note:
          type: string
          nullable: true
          example: Reception accepted the package.
      additionalProperties: false

    DriverSessionDTO:
      type: object
      description: Driver work-session response. sessionStatus is lifecycle; connectivityStatus is app connectivity.
      properties:
        sessionId:
          type: string
          example: session_20260702_000001
        userId:
          type: string
          example: user_789
        driverId:
          type: string
          example: driver_456
        driverNameSnapshot:
          type: string
          example: Alex Driver
        phone:
          type: string
          nullable: true
          example: '+19025550123'
        email:
          type: string
          format: email
          nullable: true
          example: alex.driver@example.com
        startedAt:
          type: string
          format: date-time
          example: '2026-07-02T15:00:00-03:00'
        endedAt:
          type: string
          nullable: true
          format: date-time
          example: null
        lastUpdatedAt:
          type: string
          format: date-time
          example: '2026-07-02T15:15:01-03:00'
        lastHeartbeatAt:
          type: string
          format: date-time
          example: '2026-07-02T15:15:01-03:00'
        lastOnlineAt:
          type: string
          format: date-time
          example: '2026-07-02T15:15:01-03:00'
        offlineSince:
          type: string
          nullable: true
          format: date-time
          example: null
        lastSyncAt:
          type: string
          format: date-time
          example: '2026-07-02T15:15:01-03:00'
        sessionStatus:
          $ref: '#/components/schemas/SessionStatus'
        currentStatus:
          $ref: '#/components/schemas/DriverActivityStatus'
        connectivityStatus:
          $ref: '#/components/schemas/ConnectivityStatus'
        lastKnownLocation:
          $ref: '#/components/schemas/LocationSnapshotDTO'
        orders:
          type: array
          items:
            $ref: '#/components/schemas/OrderActivityDTO'
        totalDeliveries:
          type: integer
          format: int32
          example: 0
        totalDistanceTravelledKm:
          type: number
          format: double
          example: 0.0
      additionalProperties: false

    LocationSnapshotDTO:
      type: object
      description: Persistent last-seen driver location stored in Mongo.
      properties:
        coordinates:
          $ref: '#/components/schemas/GeoJsonPoint'
        accuracyMeters:
          type: number
          format: double
          nullable: true
          example: 12.5
        speedKph:
          type: number
          format: double
          nullable: true
          example: 34.2
        heading:
          type: number
          format: double
          nullable: true
          example: 185.0
        recordedAt:
          type: string
          format: date-time
          nullable: true
          example: '2026-07-02T15:15:00-03:00'
        serverReceivedAt:
          type: string
          format: date-time
          nullable: true
          example: '2026-07-02T15:15:01-03:00'
      additionalProperties: false

    GeoJsonPoint:
      type: object
      description: GeoJSON point. Coordinates are ordered as [longitude, latitude].
      required:
        - type
        - coordinates
      properties:
        type:
          type: string
          enum:
            - Point
          example: Point
        coordinates:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: number
            format: double
          example:
            - -63.5752
            - 44.6488
      additionalProperties: false

    OrderActivityDTO:
      type: object
      description: Lean order activity snapshot tracked within a driver session. Proof-of-pickup, proof-of-delivery, photos, and signatures are owned by orderfulfilment-ms.
      properties:
        orderFulfillmentId:
          type: string
          example: of_123
        shippingOrderId:
          type: string
          nullable: true
          description: Shipping order id copied from the order assignment notification.
          example: so_789
        trackingNumber:
          type: string
          nullable: true
          description: Customer-facing tracking number copied from the order assignment notification.
          example: MPC123456789
        assignedAt:
          type: string
          format: date-time
          example: '2026-07-02T18:50:00-03:00'
        startedAt:
          type: string
          nullable: true
          format: date-time
          example: '2026-07-02T19:05:00-03:00'
        completedAt:
          type: string
          nullable: true
          format: date-time
          example: '2026-07-02T19:45:00-03:00'
        pickup:
          $ref: '#/components/schemas/StopSnapshotDTO'
        dropoff:
          $ref: '#/components/schemas/StopSnapshotDTO'
        distanceToDelivery:
          type: number
          example: 12.4
        taskStatus:
          $ref: '#/components/schemas/TaskStatus'
        fulfillmentStatus:
          $ref: '#/components/schemas/OrderFulfillmentStatus'
      additionalProperties: false

    StopSnapshotDTO:
      type: object
      description: Pickup or dropoff route snapshot copied from the assignment notification. Images are intentionally not stored in driver sessions.
      properties:
        address:
          $ref: '#/components/schemas/AddressSnapshotDTO'
        coordinates:
          $ref: '#/components/schemas/GeoJsonPoint'
        scheduledTime:
          type: string
          nullable: true
          format: date-time
          example: '2026-07-02T19:00:00-03:00'
        notes:
          type: string
          nullable: true
          example: Use loading dock
      additionalProperties: false

    AddressSnapshotDTO:
      type: object
      properties:
        fullName:
          type: string
          nullable: true
          example: Pickup Contact
        company:
          type: string
          nullable: true
          example: Maple Warehouse
        streetAddress:
          type: string
          nullable: true
          example: 123 Pickup St
        addressLine2:
          type: string
          nullable: true
          example: Dock 2
        city:
          type: string
          nullable: true
          example: Halifax
        province:
          type: string
          nullable: true
          example: NS
        postalCode:
          type: string
          nullable: true
          example: B3J 1A1
        country:
          type: string
          nullable: true
          example: CA
        phoneNumber:
          type: string
          nullable: true
          example: '+19025550100'
        deliveryInstructions:
          type: string
          nullable: true
          example: Use loading dock
      additionalProperties: false

    DriverLocationUpdateRequest:
      type: object
      description: Driver app GPS update. userId and driverId are not accepted in this request body.
      required:
        - sessionId
        - latitude
        - longitude
      properties:
        sessionId:
          type: string
          minLength: 1
          example: session_20260702_000001
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
          example: 44.6488
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
          example: -63.5752
        accuracyMeters:
          type: number
          format: double
          nullable: true
          example: 12.5
        speedKph:
          type: number
          format: double
          nullable: true
          example: 34.2
        heading:
          type: number
          format: double
          nullable: true
          example: 185.0
        recordedAt:
          type: string
          format: date-time
          nullable: true
          example: '2026-07-02T15:15:00-03:00'
      additionalProperties: false

    DriverLocationUpdateResponse:
      type: object
      properties:
        sessionId:
          type: string
          example: session_20260702_000001
        driverId:
          type: string
          example: driver_456
        status:
          $ref: '#/components/schemas/DriverActivityStatus'
        serverReceivedAt:
          type: string
          format: date-time
          example: '2026-07-02T15:15:01-03:00'
        ttlSeconds:
          type: integer
          format: int64
          example: 120
      additionalProperties: false

    DriverLiveLocationResponse:
      type: object
      description: Redis live driver location response for authenticated/admin callers.
      properties:
        driverId:
          type: string
          example: driver_456
        userId:
          type: string
          example: user_789
        sessionId:
          type: string
          example: session_20260702_000001
        status:
          $ref: '#/components/schemas/DriverActivityStatus'
        latitude:
          type: number
          format: double
          example: 44.6488
        longitude:
          type: number
          format: double
          example: -63.5752
        accuracyMeters:
          type: number
          format: double
          nullable: true
          example: 12.5
        speedKph:
          type: number
          format: double
          nullable: true
          example: 34.2
        heading:
          type: number
          format: double
          nullable: true
          example: 185.0
        recordedAt:
          type: string
          format: date-time
          nullable: true
          example: '2026-07-02T15:15:00-03:00'
        serverReceivedAt:
          type: string
          format: date-time
          example: '2026-07-02T15:15:01-03:00'
        live:
          type: boolean
          example: true
      additionalProperties: false

    DriverLiveLocationsResponse:
      type: object
      properties:
        count:
          type: integer
          format: int32
          example: 1
        drivers:
          type: array
          items:
            $ref: '#/components/schemas/DriverLiveLocationResponse'
      additionalProperties: false

    PublicDriverLiveLocationResponse:
      type: object
      description: Sanitized public live driver location. userId, accuracyMeters, and speedKph are intentionally omitted.
      properties:
        driverId:
          type: string
          example: driver_456
        sessionId:
          type: string
          example: session_20260702_000001
        status:
          $ref: '#/components/schemas/DriverActivityStatus'
        latitude:
          type: number
          format: double
          example: 44.6488
        longitude:
          type: number
          format: double
          example: -63.5752
        heading:
          type: number
          format: double
          nullable: true
          example: 185.0
        recordedAt:
          type: string
          format: date-time
          nullable: true
          example: '2026-07-02T15:15:00-03:00'
        serverReceivedAt:
          type: string
          format: date-time
          example: '2026-07-02T15:15:01-03:00'
        live:
          type: boolean
          example: true
      additionalProperties: false

    ErrorResponse:
      type: object
      required:
        - status
        - message
        - errors
        - errorDetails
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: An error occurred
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ErrorResponseErrors'
        errorDetails:
          $ref: '#/components/schemas/ErrorResponseErrorDetails'
      additionalProperties: false

    ErrorResponseErrors:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          example: latitude
        message:
          type: string
          example: Latitude must be between -90 and 90
      additionalProperties: false

    ErrorResponseErrorDetails:
      type: object
      required:
        - errorCode
        - errorType
        - characteristics
      properties:
        errorCode:
          type: integer
          format: int32
          example: 400
        errorType:
          type: string
          example: Validation Error
        characteristics:
          type: object
          additionalProperties:
            type: string
          example:
            path: /api/v1/driver/location
      additionalProperties: false

    ActuatorHealthResponse:
      type: object
      properties:
        status:
          type: string
          example: UP
        components:
          type: object
          additionalProperties: true
      additionalProperties: true

    SessionStatus:
      type: string
      description: Driver session lifecycle status.
      enum:
        - ACTIVE
        - ENDED
        - CANCELLED
      example: ACTIVE

    DriverActivityStatus:
      type: string
      description: Driver activity status within an active session.
      enum:
        - IDLE
        - EN_ROUTE
        - BUSY
        - ON_BREAK
      example: IDLE

    ConnectivityStatus:
      type: string
      description: Whether the backend has recently heard from the driver app.
      enum:
        - ONLINE
        - STALE
        - OFFLINE
      example: ONLINE

    TaskStatus:
      type: string
      enum:
        - ASSIGNED
        - IN_PROGRESS
        - END_OF_DAY
        - COMPLETED
      example: ASSIGNED

    OrderFulfillmentStatus:
      type: string
      enum:
        - DRAFT
        - PAYMENT_PENDING
        - CONFIRMED
        - PENDING
        - LABEL_CREATED
        - SCHEDULED
        - CREATED
        - ASSIGNED
        - PICKED_UP
        - IN_TRANSIT
        - DELIVERED
        - PICKUP_FAILED
        - DROP_OFF_FAILED
        - RETURNED
        - FAILED
        - CANCELLED
        - END_OF_DAY
        - IN_PROGRESS
      example: ASSIGNED

    FulfillmentStatus:
      type: string
      description: Fulfilment status enum accepted by ordermanagement-fulfilment-ms.
      enum:
        - DRAFT
        - PAYMENT_PENDING
        - CONFIRMED
        - PENDING
        - LABEL_CREATED
        - SCHEDULED
        - CREATED
        - ASSIGNED
        - PICKED_UP
        - IN_TRANSIT
        - DELIVERED
        - PICKUP_FAILED
        - DROP_OFF_FAILED
        - RETURNED
        - FAILED
        - CANCELLED
        - END_OF_DAY
        - IN_PROGRESS
      example: IN_TRANSIT

    SignatureStatus:
      type: string
      enum:
        - NOT_REQUIRED
        - REQUIRED_PENDING
        - CAPTURED
        - REFUSED
        - UNAVAILABLE
        - WAIVED
      example: CAPTURED

    SignerRelationship:
      type: string
      enum:
        - CUSTOMER
        - RECEPTION
        - SECURITY
        - FAMILY_MEMBER
        - STAFF
        - OTHER
      example: RECEPTION
