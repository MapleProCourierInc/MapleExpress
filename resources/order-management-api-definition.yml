            lastCustomerMessageAt: { type: string, format: date-time, nullable: true }
            lastAdminMessageAt: { type: string, format: date-time, nullable: true }
            lastSystemMessageAt: { type: string, format: date-time, nullable: true }
            resolvedAt: { type: string, format: date-time, nullable: true }
            resolvedByAdminUserId: { type: string, nullable: true }
            resolutionSummary: { type: string, nullable: true }
            closedAt: { type: string, format: date-time, nullable: true }
            closedByUserId: { type: string, nullable: true }
            archivedAt: { type: string, format: date-time, nullable: true }
            archivedByUserId: { type: string, nullable: true }
            createdByUserId: { type: string, nullable: true }
            updatedByUserId: { type: string, nullable: true }

    PagedManualQuoteTicketSummaryResponse:
      type: object
      properties:
