          schema: { type: string }
      responses:
        '200':
          description: Customer-visible ticket detail returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportTicketDetailResponse'
        '403':
          description: Ticket is not owned by or visible to this customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Support ticket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/support-tickets/{ticketId}/messages:
    post:
      tags: [Support Tickets]
      summary: Add a customer reply to a support ticket
      description: |
        Adds a customer-visible message with optional attachment metadata/S3 keys.
        The ticket status becomes `WAITING_FOR_ADMIN`.
      operationId: addCustomerSupportTicketMessage
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - in: path
          name: ticketId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddSupportTicketMessageRequest'
            examples:
              replyWithAttachment:
                summary: Customer reply with attachment metadata
                value:
                  message: Here is a picture of the damaged package.
                  attachments:
                    - fileName: damaged-package.jpg
                      contentType: image/jpeg
                      sizeBytes: 245881
                      storageKey: support-tickets/TKT_ABC/ATT_001-damaged-package.jpg
      responses:
        '200':
          description: Updated customer-visible ticket detail returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportTicketDetailResponse'
        '400':
          description: Ticket is closed, cancelled, archived, or request is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Ticket is not owned by this customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Support ticket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/support-tickets/{ticketId}/mark-read:
    patch:
      tags: [Support Tickets]
      summary: Mark a support ticket as read by the customer
      operationId: markSupportTicketReadByCustomer
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - in: path
          name: ticketId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Read flag updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSupportTicketActionResponse'

  /api/v1/support-tickets/{ticketId}/cancel:
    patch:
      tags: [Support Tickets]
      summary: Cancel a customer-owned support ticket
      operationId: cancelMySupportTicket
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - in: path
          name: ticketId
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelSupportTicketRequest'
      responses:
        '200':
          description: Ticket cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSupportTicketActionResponse'
        '400':
          description: Ticket is already resolved, closed, cancelled, archived, or request is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/admin/support-tickets:
    get:
      tags: [Admin Support Tickets]
