        - in: query
          name: category
          schema:
            $ref: '#/components/schemas/SupportTicketCategory'
        - in: query
          name: priority
          schema:
            $ref: '#/components/schemas/SupportTicketPriority'
        - in: query
          name: clientUserId
          schema: { type: string }
        - in: query
          name: organizationId
          schema: { type: string }
        - in: query
          name: assignedAdminUserId
          schema: { type: string }
        - in: query
          name: shippingOrderId
          schema: { type: string }
        - in: query
          name: orderItemId
          schema: { type: string }
        - in: query
          name: fulfilmentId
          schema: { type: string }
        - in: query
          name: driverUserId
          schema: { type: string }
        - in: query
          name: billingAccountId
          schema: { type: string }
        - in: query
          name: invoiceId
          schema: { type: string }
        - in: query
          name: paymentId
          schema: { type: string }
        - in: query
          name: fromDate
          schema: { type: string, format: date-time }
        - in: query
          name: toDate
          schema: { type: string, format: date-time }
        - in: query
          name: archived
          schema: { type: boolean }
        - in: query
          name: page
          schema: { type: integer, minimum: 0, default: 0 }
        - in: query
          name: size
          schema: { type: integer, minimum: 1, maximum: 200, default: 20 }
        - in: query
          name: sort
          schema: { type: string, example: "updatedAt,desc" }
      responses:
        '200':
          description: Admin ticket summaries returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedSupportTicketSummaryResponse'
        '403':
          description: Forbidden, admin role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/admin/support-tickets/{ticketId}:
    get:
