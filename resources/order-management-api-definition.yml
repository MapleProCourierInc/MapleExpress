      type: object
      properties:
        assignedAdminUserId:
          type: string
          nullable: true
          example: admin-user-sub-123

    UpdateManualQuoteTicketRequest:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/SupportTicketStatus'
        priority:
