            application/json:
              schema:
                $ref: '#/components/schemas/ManualQuoteActionResponse'

  /api/v1/admin/manual-quotes/{ticketId}/messages:
    post:
      tags: [Manual Quotes]
      summary: Admin send customer-visible manual quote message
      operationId: adminAddManualQuoteCustomerMessage
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - in: path
          name: ticketId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualQuoteMessageRequest'
      responses:
        '200':
          description: Message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManualQuoteActionResponse'

  /api/v1/admin/manual-quotes/{ticketId}/internal-notes:
    post:
      tags: [Manual Quotes]
      summary: Admin add manual quote internal note
      description: Internal notes are included for admin detail and hidden from customer detail.
      operationId: adminAddManualQuoteInternalNote
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - in: path
          name: ticketId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualQuoteMessageRequest'
      responses:
        '200':
          description: Internal note added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManualQuoteActionResponse'

  /api/v1/admin/manual-quotes/{ticketId}/quote-offers:
    post:
      tags: [Manual Quotes]
      summary: Admin create manual quote offer
      description: Creates a structured offer for one or more order items and supersedes previous active offers for MVP.
      operationId: adminCreateManualQuoteOffer
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - in: path
          name: ticketId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateManualQuoteOfferRequest'
      responses:
        '200':
          description: Manual quote offer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManualQuoteActionResponse'

  /api/v1/admin/manual-quotes/{ticketId}/quote-offers/{quoteId}:
    patch:
      tags: [Manual Quotes]
      summary: Admin update, withdraw, or expire manual quote offer
      description: Allows safe offer updates before acceptance. Accepted offers cannot be changed.
      operationId: adminUpdateManualQuoteOffer
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - in: path
          name: ticketId
          required: true
          schema: { type: string }
        - in: path
          name: quoteId
          required: true
          schema: { type: string, example: MQO_MDR7F8G }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateManualQuoteOfferRequest'
      responses:
        '200':
          description: Manual quote offer updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManualQuoteActionResponse'

  /api/v1/admin/manual-quotes/{ticketId}/assign:
    patch:
      tags: [Manual Quotes]
      summary: Admin assign manual quote ticket
      operationId: adminAssignManualQuoteTicket
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - in: path
          name: ticketId
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignManualQuoteTicketRequest'
      responses:
        '200':
          description: Manual quote ticket assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManualQuoteActionResponse'

  /api/v1/admin/manual-quotes/{ticketId}/close:
    patch:
      tags: [Manual Quotes]
      summary: Admin close manual quote ticket
      description: Closes the manual quote ticket without patching order pricing.
      operationId: adminCloseManualQuoteTicket
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - in: path
          name: ticketId
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloseManualQuoteTicketRequest'
      responses:
        '200':
          description: Manual quote ticket closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManualQuoteActionResponse'

  /api/v1/admin/manual-quotes/{ticketId}/archive:
    patch:
      tags: [Manual Quotes]
      summary: Admin archive manual quote ticket
      operationId: adminArchiveManualQuoteTicket
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - in: path
          name: ticketId
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArchiveManualQuoteTicketRequest'
      responses:
        '200':
          description: Manual quote ticket archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManualQuoteActionResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    internalServiceAuth:
      type: apiKey
      in: header
      name: X-Internal-Service-Secret
      description: Shared secret header for trusted service-to-service calls.

  parameters:
    AuthorizationHeader:
      in: header
      name: Authorization
      required: true
      schema:
        type: string
        example: Bearer eyJhbGciOi...
    AcceptHeader:
      in: header
      name: Accept
      required: true
      schema:
        type: string
        default: application/json
    ContentTypeHeader:
      in: header
      name: Content-Type
      required: true
      schema:
        type: string
        default: application/json
    InternalServiceSecretHeader:
      in: header
      name: X-Internal-Service-Secret
      required: true
      schema:
        type: string
        format: password
        example: <secret>

  schemas:
    CreateOrderResponse:
      type: object
      properties:
        shippingOrder:
          $ref: '#/components/schemas/ShippingOrder'

    NeedAdminAttentionRequest:
      type: object
      properties:
        message:
          type: string
          description: Optional message explaining why admin attention is required.

    RemoveOrderItemsRequest:
      type: object
      required: [trackingIds]
      properties:
        trackingIds:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1

    RushPriorityToggleRequest:
      type: object
      required: [rushPriorityRequested]
      properties:
        rushPriorityRequested:
          type: boolean
          description: Whether pricing-payment-ms should apply rush priority pricing.


    CreateServiceZoneRequest:
      type: object
      required: [zoneName, city, station, active, priority, polygon]
      properties:
        zoneName: { type: string, example: Moncton Core Service Area }
        city: { type: string, example: Moncton }
        station: { type: string, example: Moncton }
        active: { type: boolean, example: true }
        priority: { type: integer, example: 1 }
        polygon:
          $ref: '#/components/schemas/ServiceZonePolygon'

    CreateServiceZoneResponse:
      type: object
      properties:
        serviceZone:
          $ref: '#/components/schemas/ServiceZone'

    ServiceZone:
      type: object
      properties:
        id: { type: string, example: SZ_001 }
        zoneName: { type: string }
        city: { type: string }
        station: { type: string }
        active: { type: boolean }
        priority: { type: integer }
        polygon:
          $ref: '#/components/schemas/ServiceZonePolygon'
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdBy: { type: string }
        updatedBy: { type: string }

    ServiceZonePolygon:
      type: object
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [Polygon]
        coordinates:
          type: array
          description: GeoJSON Polygon coordinates in [longitude, latitude] order.
          items:
            type: array
            items:
              type: array
              minItems: 2
              maxItems: 2
              items:
                type: number
      example:
        type: Polygon
        coordinates:
          -
            - [-64.8151, 46.1201]
            - [-64.7602, 46.1450]
            - [-64.7010, 46.1098]
            - [-64.7305, 46.0604]
            - [-64.8008, 46.0720]
            - [-64.8151, 46.1201]


    ListServiceZonesResponse:
      type: object
      properties:
        serviceZones:
          type: array
          items:
            $ref: '#/components/schemas/ServiceZone'

    ToggleServiceZoneActiveRequest:
      type: object
      required: [active]
      properties:
        active:
          type: boolean
          example: false


    PagedCustomerOrderSummaryResponse:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: '#/components/schemas/CustomerOrderSummaryResponse'
        pagination:
          $ref: '#/components/schemas/PaginationMetadata'

    CustomerOrderSummaryResponse:
      type: object
      properties:
        shippingOrderId: { type: string }
        createdAt: { type: string, format: date-time }
        orderStatus: { type: string }
        needsAdminAttention:
          type: boolean
          description: Indicates whether this shipping order requires admin review.
        amount: { type: number }
        numberOfOrderItems: { type: integer }

    CustomerOrderDetailResponse:
      type: object
      properties:
        shippingOrder:
          $ref: '#/components/schemas/ShippingOrder'
        documents:
          type: array
          items:
            $ref: '#/components/schemas/CustomerOrderDocumentResponse'

    CustomerOrderDocumentResponse:
      type: object
      properties:
        documentType:
          type: string
          example: SHIPPING_LABEL
        documentName:
          type: string
          example: shipping-label.pdf
        s3Key:
          type: string
          example: shipping-orders/SO_123/documents/shipping-label.pdf
        presignedUrl:
          type: string
          format: uri

    PagedOrdersResponse:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: '#/components/schemas/ShippingOrder'
        pagination:
          $ref: '#/components/schemas/PaginationMetadata'

    PagedOrderItemsResponse:
      type: object
      properties:
        orderItems:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        pagination:
          $ref: '#/components/schemas/PaginationMetadata'

    PaginationMetadata:
      type: object
      properties:
        page: { type: integer }
        size: { type: integer }
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer }
        sortBy: { type: string }
        sortDir: { type: string }

    ShippingOrder:
      type: object
      required: [shippingOrderId, customerContact, orderItems]
      properties:
        shippingOrderId: { type: string }
        userId:
          type: string
          description: Deprecated in request for POST /orders. Server derives this from JWT sub.
          readOnly: true
        clientUserId:
          type: string
          description: Authenticated client user ID derived from JWT sub.
          readOnly: true
        clientType:
          type: string
          description: Derived from Cognito group (`client_individual` or `client_organization`).
          readOnly: true
        customerContact:
          $ref: '#/components/schemas/ShippingOrderCustomerContact'
        priorityDelivery: { type: boolean }
        needsAdminAttention:
          type: boolean
          description: Indicates whether this shipping order requires admin review.
        orderStatus: { type: string }
        assignedDriverId: { type: string }
        isFragile: { type: boolean }
        paymentStatus: { type: string }
        paymentId: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        aggregatedPricing:
          $ref: '#/components/schemas/ShippingOrderAggregatedPricing'
        notes:
          type: array
          description: Audit notes associated with root-level order changes.
          readOnly: true
          items:
            $ref: '#/components/schemas/ShippingOrderNote'
        orderItems:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'

    ShippingOrderCustomerContact:
      type: object
      properties:
        name: { type: string }
        phone: { type: string }
        email: { type: string }
        taxId: { type: string }

    ShippingOrderNote:
      type: object
      properties:
        changedAt: { type: string, format: date-time }
        changedByUserId: { type: string }
        changedByRoles:
          type: array
          items: { type: string }
        previousStatus: { type: string }
        newStatus: { type: string }
        source: { type: string, example: ORDERS_API }
        message: { type: string }

    ShippingOrderAggregatedPricing:
      type: object
      properties:
        currency: { type: string, example: CAD }
        customQuoteRequired: { type: boolean }
        customQuoteReasons:
          type: array
          items:
            type: string
        charges:
          type: object
          additionalProperties:
            type: number
        totalAmount: { type: number }

    OrderItem:
      type: object
      required: [trackingId, pickup, dropoff]
      properties:
        trackingId: { type: string }
        pickup:
          $ref: '#/components/schemas/OrderItemPickup'
        dropoff:
          $ref: '#/components/schemas/OrderItemDropoff'
        distanceToDelivery: { type: number }
        packageDetails:
          $ref: '#/components/schemas/OrderItemPackageDetails'
        pricing:
          $ref: '#/components/schemas/OrderItemPricing'
        itemStatus: { type: string }
        description: { type: string, description: Customer-provided description of this order item. }
        assignedDriverId: { type: string }
        isFragile: { type: boolean }
        signature:
          $ref: '#/components/schemas/SignatureDetails'
        signatureRequired:
          type: boolean
          description: Whether this order item requires a delivery signature.
        signatureStatus:
          $ref: '#/components/schemas/SignatureStatus'
        estimatedDeliveryTime: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        specialIncidents:
          type: array
          items:
            $ref: '#/components/schemas/Incident'

    SignatureDetails:
      type: object
      properties:
        signedByName:
          type: string
          description: Name of the person who signed for the item.
        signedByRelationship:
          $ref: '#/components/schemas/SignerRelationship'
        signatureImageUrl:
          type: string
          description: Public or presigned URL for the captured signature image.
        signatureImageObjectKey:
          type: string
          description: Object storage key for the captured signature image.
        signedAt:
          type: string
          format: date-time
          description: Timestamp when the signature was captured.
        capturedByDriverId:
          type: string
          description: Driver ID that captured the signature.
        note:
          type: string
          description: Optional signature capture note.

    SignatureStatus:
      type: string
      enum: [NOT_REQUIRED, REQUIRED_PENDING, CAPTURED, REFUSED, UNAVAILABLE, WAIVED]

    SignerRelationship:
      type: string
      enum: [CUSTOMER, RECEPTION, SECURITY, FAMILY_MEMBER, STAFF, OTHER]

    OrderItemPickup:
      type: object
      properties:
        address:
          $ref: '#/components/schemas/Address'
        coordinates:
          $ref: '#/components/schemas/Location'
        time: { type: string, format: date-time }
        notes: { type: string }
        images:
          type: array
          items:
            $ref: '#/components/schemas/Image'

    OrderItemDropoff:
      type: object
      properties:
        address:
          $ref: '#/components/schemas/Address'
        coordinates:
          $ref: '#/components/schemas/Location'
        time: { type: string, format: date-time }
        notes: { type: string }
        images:
          type: array
          items:
            $ref: '#/components/schemas/Image'

    OrderItemPackageDetails:
      type: object
      properties:
        weight: { type: number }
        dimensions:
          $ref: '#/components/schemas/OrderItemPackageDetailsDimensions'
        type: { type: string }
        value: { type: number }
        images:
          type: array
          items:
            $ref: '#/components/schemas/Image'

    OrderItemPackageDetailsDimensions:
      type: object
      properties:
        length: { type: number }
        width: { type: number }
        height: { type: number }

    OrderItemPricing:
      type: object
      properties:
        pricingModelId: { type: string }
        pricingModelVersion: { type: integer }
        pricingTypeApplied: { type: string, enum: [GLOBAL, CUSTOMER_SPECIFIC] }
        ownerIdApplied: { type: string, nullable: true }
        zoneCode: { type: string, example: GLOBAL }
        currency: { type: string, example: CAD }
        customQuoteRequired: { type: boolean }
        customQuoteReason: { type: string, nullable: true }
        charges:
          type: object
          additionalProperties:
            type: number
        calculationContext:
          type: object
          additionalProperties: true
        metadata:
          type: object
          nullable: true
          additionalProperties: true

    Incident:
      type: object
      properties:
        incidentType: { type: string }
        description: { type: string }
        time: { type: string, format: date-time }
        location: { type: string }
        images:
          type: array
          items:
            $ref: '#/components/schemas/IncidentImagesInner'

    IncidentImagesInner:
      type: object
      properties:
        description: { type: string }
        imageUrl: { type: string }
        timestamp: { type: string, format: date-time }

    Image:
      type: object
      properties:
        imageUrl: { type: string }
        timestamp: { type: string, format: date-time }

    Address:
      type: object
      properties:
        fullName: { type: string }
        company: { type: string }
        streetAddress: { type: string }
        addressLine2: { type: string }
        city: { type: string }
        province: { type: string }
        postalCode: { type: string }
        country: { type: string }
        phoneNumber: { type: string }
        deliveryInstructions: { type: string }

    Location:
      type: object
      properties:
        latitude: { type: number }
        longitude: { type: number }


    ServiceabilityCheckRequest:
      type: object
      required: [latitude, longitude]
      properties:
        latitude:
          type: number
          minimum: -90
          maximum: 90
          example: 46.0878
        longitude:
          type: number
          minimum: -180
          maximum: 180
          example: -64.7782

    ServiceabilityCheckResponse:
      type: object
      properties:
        serviceable: { type: boolean }
        matchedZoneId:
          type: string
          nullable: true
        matchedZoneName:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        station:
          type: string
          nullable: true
        reasonCode:
          type: string
          enum: [INSIDE_SERVICE_ZONE, OUTSIDE_SERVICE_ZONE]
        message: { type: string }

    SupportTicketCategory:
      type: string
      enum:
        - GENERAL_QUERY
        - ORDER_QUERY
        - DELIVERY_ISSUE
        - DRIVER_COMPLAINT
        - DAMAGED_PACKAGE
        - MISSED_PICKUP
        - LATE_DELIVERY
        - BILLING_QUERY
        - PAYMENT_QUERY
        - INVOICE_DISPUTE
        - ACCOUNT_QUERY
        - TECHNICAL_ISSUE
        - MANUAL_QUOTE_REQUEST
        - OTHER

    SupportTicketStatus:
      type: string
      enum: [OPEN, WAITING_FOR_ADMIN, WAITING_FOR_CUSTOMER, IN_PROGRESS, RESOLVED, CLOSED, CANCELLED]

    SupportTicketPriority:
      type: string
      enum: [LOW, NORMAL, HIGH, URGENT]

    SupportTicketVisibility:
      type: string
      enum: [PUBLIC, INTERNAL]

    SupportMessageSenderType:
      type: string
      enum: [CUSTOMER, ADMIN, SYSTEM]

    RelatedResourceType:
      type: string
      enum: [NONE, SHIPPING_ORDER, ORDER_ITEM, FULFILMENT, DRIVER, BILLING_ACCOUNT, INVOICE, PAYMENT]

    ManualQuoteStatus:
      type: string
      enum: [OFFERED, ACCEPTED, REJECTED, EXPIRED, WITHDRAWN, SUPERSEDED]

    CreateSupportTicketRequest:
      type: object
      required: [category, subject, message]
      properties:
        category:
          $ref: '#/components/schemas/SupportTicketCategory'
        priority:
          $ref: '#/components/schemas/SupportTicketPriority'
        subject:
          type: string
          maxLength: 200
        message:
          type: string
          maxLength: 5000
        relatedResource:
          $ref: '#/components/schemas/RelatedResourceRefDto'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/SupportTicketAttachmentRequest'

    AddSupportTicketMessageRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          maxLength: 5000
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/SupportTicketAttachmentRequest'

    SupportTicketAttachmentRequest:
      type: object
      required: [fileName, contentType, storageKey]
      properties:
        fileName: { type: string, example: damaged-package.jpg }
        contentType: { type: string, example: image/jpeg }
        sizeBytes:
          type: integer
          format: int64
          minimum: 0
          example: 245881
        storageKey:
          type: string
          description: S3 key or storage path returned after frontend uploads through aws-integration-ms.
          example: support-tickets/TKT_ABC/ATT_001-damaged-package.jpg

    SupportTicketAttachmentResponse:
      type: object
      properties:
        attachmentId: { type: string, example: ATT_MDR7F8G1 }
        fileName: { type: string }
        contentType: { type: string }
        sizeBytes: { type: integer, format: int64 }
        storageKey: { type: string }
        downloadUrl:
          type: string
          nullable: true
          description: Usually null; frontend should request download URLs from aws-integration-ms.
        uploadedByUserId: { type: string }
        uploadedAt: { type: string, format: date-time }

    RelatedResourceRefDto:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/RelatedResourceType'
        shippingOrderId: { type: string, nullable: true }
        orderItemId: { type: string, nullable: true }
        fulfilmentId: { type: string, nullable: true }
        driverUserId: { type: string, nullable: true }
        billingAccountId: { type: string, nullable: true }
        invoiceId: { type: string, nullable: true }
        paymentId: { type: string, nullable: true }
        displayLabel: { type: string, nullable: true }

    SupportTicketClientSnapshotResponse:
      type: object
      properties:
        fullName: { type: string, nullable: true }
        email: { type: string, nullable: true }
        phoneNumber: { type: string, nullable: true }
        organizationName: { type: string, nullable: true }

    SupportTicketMessageResponse:
      type: object
      properties:
        messageId: { type: string, example: MSG_MDR7F8G1 }
        senderType:
          $ref: '#/components/schemas/SupportMessageSenderType'
        senderUserId: { type: string }
        senderDisplayName: { type: string }
        message: { type: string }
        internalNote:
          type: boolean
          description: Admin-only notes are omitted from customer-facing detail APIs.
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/SupportTicketAttachmentResponse'
        createdAt: { type: string, format: date-time }

    ManualQuoteItemLineResponse:
      type: object
      properties:
        orderItemId: { type: string, example: ITEM_123 }
        itemDisplayName:
          type: string
          nullable: true
          example: Large box - 35kg
        customQuoteReason:
          type: string
          nullable: true
          example: WEIGHT_EXCEEDS_LIMIT
        quoteReasonDescription:
          type: string
          nullable: true
          example: Item exceeds standard package weight limits and requires manual pricing.
        charges:
          type: object
          nullable: true
          additionalProperties:
            type: number
          example:
            subtotal: 55.00
            manualBaseCharge: 45.00
            oversizeSurcharge: 10.00
            HST: 8.25
            total: 63.25
        subtotal:
          type: number
          nullable: true
          example: 55.00
        taxAmount:
          type: number
          nullable: true
          example: 8.25
        totalAmount:
          type: number
          nullable: true
          example: 63.25
        calculationContext:
          type: object
          nullable: true
          additionalProperties: true
          example:
            weightKg: 35
            distanceKm: 12.4
        metadata:
          type: object
          nullable: true
          additionalProperties: true

    OrderPricingPreview:
      type: object
      description: Display-only full-order pricing preview for a manual quote offer. Final payable pricing is owned by ShippingOrder after quote acceptance.
      properties:
        subtotal:
          type: number
          example: 90.00
        taxes:
          type: object
          additionalProperties:
            type: number
          example:
            HST: 13.50
        total:
          type: number
          example: 103.50
        currency:
          type: string
          example: CAD

    ManualQuoteOfferResponse:
      type: object
      properties:
        quoteId:
          type: string
          example: MQO_MDR7F8G
        shippingOrderId:
          type: string
          example: ORD_123
        status:
          $ref: '#/components/schemas/ManualQuoteStatus'
        title:
          type: string
          nullable: true
          example: Manual quote for oversized packages
        description:
          type: string
          nullable: true
          example: Two items exceed our standard package limits and require manual pricing.
        itemLines:
          type: array
          description: Quote lines for individual order items. For MVP, the full offer is accepted or rejected together.
          items:
            $ref: '#/components/schemas/ManualQuoteItemLineResponse'
        orderPricingPreview:
          $ref: '#/components/schemas/OrderPricingPreview'
        currency:
          type: string
          nullable: true
          example: CAD
        pricingModelId:
          type: string
          nullable: true
        pricingModelVersion:
          type: integer
          nullable: true
        pricingTypeApplied:
          type: string
          nullable: true
          example: MANUAL_ADMIN_QUOTE
        ownerIdApplied:
          type: string
          nullable: true
        zoneCode:
          type: string
          nullable: true
        calculationContext:
          type: object
          nullable: true
          additionalProperties: true
          example:
            distanceKm: 12.4
            serviceType: SAME_DAY
            taxProvince: NB
        metadata:
          type: object
          nullable: true
          additionalProperties: true
          example:
            source: ADMIN_MANUAL_ENTRY
            manualQuoteTicketId: TKT_MDR7F8G
        quotedByAdminUserId:
          type: string
          nullable: true
        quotedAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        customerDecisionByUserId:
          type: string
          nullable: true
        customerDecisionAt:
          type: string
          format: date-time
          nullable: true
        customerRejectionReason:
          type: string
          nullable: true
        relatedMessageId:
          type: string
          nullable: true
          description: Message id that announced this offer in the ticket conversation, when available.

    SupportTicketSummaryResponse:
      type: object
      properties:
        ticketId: { type: string, example: TKT_MDR7F8G1 }
        ticketNumber: { type: string, example: MX-TKT-2026-000001 }
        clientUserId: { type: string }
        organizationId: { type: string, nullable: true }
        clientSnapshot:
          $ref: '#/components/schemas/SupportTicketClientSnapshotResponse'
        category:
          $ref: '#/components/schemas/SupportTicketCategory'
        status:
          $ref: '#/components/schemas/SupportTicketStatus'
        priority:
          $ref: '#/components/schemas/SupportTicketPriority'
        visibility:
          $ref: '#/components/schemas/SupportTicketVisibility'
        subject: { type: string }
        latestMessagePreview: { type: string }
        relatedResource:
          $ref: '#/components/schemas/RelatedResourceRefDto'
        assignedAdminUserId: { type: string, nullable: true }
        customerUnread: { type: boolean }
        adminUnread: { type: boolean }
        lastCustomerMessageAt: { type: string, format: date-time, nullable: true }
        lastAdminMessageAt: { type: string, format: date-time, nullable: true }
        lastSystemMessageAt: { type: string, format: date-time, nullable: true }
        resolvedAt: { type: string, format: date-time, nullable: true }
        closedAt: { type: string, format: date-time, nullable: true }
        archived: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    SupportTicketDetailResponse:
      allOf:
        - $ref: '#/components/schemas/SupportTicketSummaryResponse'
        - type: object
          properties:
            messages:
              type: array
              items:
                $ref: '#/components/schemas/SupportTicketMessageResponse'
            manualQuoteOffers:
              type: array
              description: Manual quote offers attached to this support ticket.
              items:
                $ref: '#/components/schemas/ManualQuoteOfferResponse'
            resolvedByAdminUserId: { type: string, nullable: true }
            resolutionSummary: { type: string, nullable: true }
            closedByUserId: { type: string, nullable: true }
            archivedAt: { type: string, format: date-time, nullable: true }
            archivedByUserId: { type: string, nullable: true }
            createdByUserId: { type: string }
            updatedByUserId: { type: string }

    ManualQuoteAttachmentRequest:
      type: object
      required: [fileName, contentType, storageKey]
      properties:
        fileName: { type: string, example: package-photo.jpg }
        contentType: { type: string, example: image/jpeg }
        sizeBytes:
          type: integer
          format: int64
          minimum: 0
          example: 245881
        storageKey:
          type: string
          description: S3 key or storage path. File upload is handled outside this service.
          example: support-tickets/TKT_123/package-photo.jpg

    ManualQuoteMessageRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          maxLength: 5000
          example: Can you do this for a lower price?
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/ManualQuoteAttachmentRequest'

    ManualQuoteItemLineRequest:
      type: object
      required: [orderItemId, subtotal, totalAmount]
      properties:
        orderItemId: { type: string, example: ITEM_001 }
        itemDisplayName: { type: string, example: Large box - 35kg }
        customQuoteReason: { type: string, example: WEIGHT_EXCEEDS_LIMIT }
        quoteReasonDescription:
          type: string
          example: This item exceeds the standard package weight limit.
        charges:
          type: object
          additionalProperties:
            type: number
          example:
            subtotal: 55.00
            manualBaseCharge: 45.00
            oversizeSurcharge: 10.00
            HST: 8.25
            total: 63.25
        subtotal: { type: number, minimum: 0, example: 55.00 }
        taxAmount: { type: number, minimum: 0, nullable: true, example: 0 }
        totalAmount: { type: number, minimum: 0, example: 55.00 }
        calculationContext:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true

    CreateManualQuoteOfferRequest:
      type: object
      required: [itemLines]
      properties:
        title:
          type: string
          example: Manual quote for oversized items
        description:
          type: string
          example: Two items exceed our standard limits and require manual pricing.
        shippingOrderId:
          type: string
          nullable: true
          example: ORD_123
        itemLines:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ManualQuoteItemLineRequest'
        currency: { type: string, example: CAD }
        pricingModelId: { type: string, nullable: true }
        pricingModelVersion: { type: integer, nullable: true }
        pricingTypeApplied:
          type: string
          example: MANUAL_ADMIN_QUOTE
        ownerIdApplied:
          type: string
          nullable: true
          example: customer-or-org-id
        zoneCode:
          type: string
          nullable: true
          example: NB-DIEPPE
        calculationContext:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
          example:
            source: ADMIN_MANUAL_ENTRY
            paymentMode: PREPAID
        expiresAt:
          type: string
          format: date-time
          nullable: true
          example: 2026-06-10T23:59:59
        messageToCustomer:
          type: string
          nullable: true
          example: We can complete this delivery for $63.25 including tax.

    UpdateManualQuoteOfferRequest:
      type: object
      properties:
        title: { type: string, example: Updated manual quote }
        description: { type: string, example: Updated price after review. }
        status:
          type: string
          enum: [WITHDRAWN, EXPIRED]
          example: WITHDRAWN
        expiresAt:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        messageToCustomer:
          type: string
          nullable: true
          example: The previous quote has been withdrawn. We are preparing a new one.

    AcceptManualQuoteOfferRequest:
      type: object
      properties:
        acceptanceNote:
          type: string
          maxLength: 1000
          example: I accept this quote.

    RejectManualQuoteOfferRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 1000
          example: This is too expensive for me.

