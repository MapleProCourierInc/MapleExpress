openapi: 3.0.3
info:
  title: Order Management Order MS API
  version: 1.0.0
  description: |
    OpenAPI contract for APIs exposed by the `ordermanagement-order-ms` service.
    Base servlet context path is `/ordermanagement`. This service exposes order APIs under `/orders`
    and support ticket APIs under `/api/v1/support-tickets` and `/api/v1/admin/support-tickets`.
servers:
  - url: /ordermanagement
    description: Service base path
security:
  - bearerAuth: []
paths:
  /orders:
    post:
      tags: [Orders]
      summary: Create a new draft shipping order
      description: |
        Creates a draft shipping order for the authenticated client.
        `userId` is derived from JWT `sub` and client type is inferred from `cognito:groups` (`client_individual` or `client_organization`).
        During creation, this service calls profile-ms (individual/organization profile lookup) and pricing-payment-ms (`POST /api/v2/pricing/quote`) using the forwarded bearer token.
        Before pricing and persistence, every `orderItems[].pickup.coordinates` and `orderItems[].dropoff.coordinates` is validated against ACTIVE MapleX service zones.
        If any pickup/dropoff location is outside serviceable area, order creation is rejected.
      operationId: createOrder
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/AcceptHeader'
        - $ref: '#/components/parameters/ContentTypeHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShippingOrder'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrderResponse'
        '400':
          description: Bad request (validation error, including non-serviceable pickup/dropoff coordinates)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (missing or invalid Cognito client group)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream dependency returned an invalid response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Upstream dependency unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags: [Orders]
      summary: List shipping orders with optional filters and pagination
      operationId: getOrders
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/AcceptHeader'
        - $ref: '#/components/parameters/ContentTypeHeader'
        - in: query
          name: shippingOrderId
          schema: { type: string }
        - in: query
          name: orderStatus
          description: Filter by one or more root order statuses. Repeat the parameter for multiple values.
          style: form
          explode: true
          schema:
            type: array
            items: { type: string }
        - in: query
          name: userId
          schema: { type: string }
        - in: query
          name: clientUserId
          schema: { type: string }
        - in: query
          name: clientType
          schema: { type: string }
        - in: query
          name: paymentStatus
          schema: { type: string }
        - in: query
          name: trackingId
          schema: { type: string }
        - in: query
          name: priorityDelivery
          schema: { type: boolean }
        - in: query
          name: createdFrom
          schema: { type: string, format: date-time }
        - in: query
          name: createdTo
          schema: { type: string, format: date-time }
        - in: query
          name: updatedFrom
          schema: { type: string, format: date-time }
        - in: query
          name: updatedTo
          schema: { type: string, format: date-time }
        - in: query
          name: page
          schema: { type: integer, minimum: 0, default: 0 }
        - in: query
          name: size
          schema: { type: integer, minimum: 1, maximum: 200, default: 20 }
        - in: query
          name: sortBy
          schema: { type: string, default: createdAt }
        - in: query
          name: sortDir
          schema: { type: string, enum: [asc, desc], default: desc }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedOrdersResponse'
        '401':
          description: Unauthorized
    put:
      tags: [Orders]
      summary: Update an existing draft order
      operationId: updateOrder
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/AcceptHeader'
        - $ref: '#/components/parameters/ContentTypeHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShippingOrder'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrderResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized

  /orders/admin/needs-admin-attention:
    get:
      tags: [Admin Orders]
      summary: List shipping orders requiring admin attention
      description: |
        Admin-only endpoint. Returns all shipping orders where `needsAdminAttention` is `true`.
        The caller must have the `admin_super` role or Cognito group in the authenticated JWT.
      operationId: getOrdersNeedingAdminAttention
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/AcceptHeader'
      responses:
        '200':
          description: Orders requiring admin attention returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShippingOrder'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (admin-only endpoint)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


  /orders/my-orders:
    get:
      tags: [Orders]
      summary: List shipping orders for the authenticated user dashboard
      description: |
        Returns a paginated lightweight list of orders placed by the authenticated user.
        By default, DRAFT orders are excluded to preserve the existing dashboard behavior.
        When one or more orderStatus filters are provided, only those statuses are returned, including DRAFT when explicitly requested.
        The customer user ID is always resolved from the JWT `sub` claim; this endpoint does not accept a user ID from the frontend.
      operationId: getMyOrders
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/AcceptHeader'
        - in: query
          name: orderStatus
          description: Filter by one or more root order statuses. Repeat the parameter for multiple values or provide comma-separated values.
          style: form
          explode: true
          schema:
            type: array
            items: { type: string }
        - in: query
          name: page
          schema: { type: integer, minimum: 0, default: 0 }
        - in: query
          name: size
          schema: { type: integer, minimum: 1, maximum: 200, default: 20 }
        - in: query
          name: sortBy
          schema: { type: string, default: createdAt }
        - in: query
          name: sortDir
          schema: { type: string, enum: [asc, desc], default: desc }
      responses:
        '200':
          description: Authenticated user's order summaries returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedCustomerOrderSummaryResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing authenticated JWT subject
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders/my-orders/{shippingOrderId}:
    get:
      tags: [Orders]
      summary: Get authenticated user's non-draft shipping order details with document URLs
      description: |
        Returns the full shipping order plus a limited document section containing document type/name, S3 key, and presigned view URL.
        The customer user ID is always resolved from the JWT `sub` claim, and the order must belong to that user.
        DRAFT orders are excluded from this dashboard detail endpoint.
      operationId: getMyOrderDetails
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/AcceptHeader'
        - in: path
          name: shippingOrderId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Authenticated user's order detail returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerOrderDetailResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing authenticated JWT subject
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Shipping order not found for authenticated user, or order is DRAFT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Document generator or AWS integration returned an invalid response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders/{shippingOrderId}:
    get:
      tags: [Orders]
      summary: Get a shipping order by ID
      operationId: getOrderByShippingOrderId
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/AcceptHeader'
        - $ref: '#/components/parameters/ContentTypeHeader'
        - in: path
          name: shippingOrderId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShippingOrder'
        '404':
          description: Not found
    delete:
      tags: [Orders]
      summary: Delete a shipping order when status is DRAFT
      operationId: deleteOrder
      parameters:
        - in: path
          name: shippingOrderId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Shipping Order deleted successfully.
        '400':
          description: Not in DRAFT status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found

  /orders/{shippingOrderId}/need-admin-attention:
    patch:
      tags: [Orders]
      summary: Mark a shipping order as requiring admin attention
      description: |
        Sets `needsAdminAttention` to `true` and appends an audit note.
        The root `orderStatus` is not changed by this endpoint.
        Order item statuses are not modified. The request body is optional.
      operationId: markOrderAsNeedingAdminAttention
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - in: path
          name: shippingOrderId
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NeedAdminAttentionRequest'
      responses:
        '200':
          description: Admin-attention flag updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShippingOrder'
        '404':
          description: Shipping order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders/{shippingOrderId}/cancel:
    patch:
      tags: [Orders]
      summary: Cancel a shipping order
      description: |
        Marks the root `orderStatus` as `CANCELLED` and appends an audit note containing the cancelling user ID, cancellation timestamp, and previous order status.
      operationId: cancelOrder
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - in: path
          name: shippingOrderId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShippingOrder'
        '404':
          description: Shipping order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders/{shippingOrderId}/remove-order-items:
    patch:
      tags: [Orders]
      summary: Remove persisted items from an editable shipping order
      description: |
        Removes order items matching the requested tracking IDs from a `DRAFT` or `PENDING_CUSTOM_QUOTE` order owned by the authenticated client.
        Existing persisted item pricing is re-aggregated locally. This endpoint does not call geocoding, serviceability, profile, or pricing dependencies.
        At least one order item must remain after removal.
      operationId: removeOrderItems
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - in: path
          name: shippingOrderId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveOrderItemsRequest'
      responses:
        '200':
          description: Items removed and updated shipping order returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShippingOrder'
        '400':
          description: Invalid tracking IDs, non-editable status, or removal of every item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated client does not own this shipping order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Shipping order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders/{shippingOrderId}/rush-priority:
    patch:
      tags: [Orders]
      summary: Enable or disable rush priority pricing for an editable shipping order
      description: |
        Updates the root `priorityDelivery` flag and reprices each persisted order item using stored package, distance, zone, and pricing model inputs.
        The endpoint does not rerun geocoding, Google distance matrix calculations, profile lookup, or the full draft update flow.
        Every item must be repriced successfully before the shipping order is saved.
      operationId: toggleRushPriority
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - in: path
          name: shippingOrderId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RushPriorityToggleRequest'
      responses:
        '200':
          description: Rush priority selection updated and repriced shipping order returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShippingOrder'
        '400':
          description: Invalid request, non-editable status, or missing stored repricing input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated client does not own this shipping order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Shipping order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Pricing dependency returned an invalid response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Pricing dependency unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /internal/orders/{shippingOrderId}:
    get:
      tags: [Internal Orders]
      summary: Internal service-to-service lookup for a shipping order by ID
      description: |
        Fetches a shipping order for trusted internal consumers.
        This endpoint is under the `/ordermanagement` servlet context path and uses internal secret header authentication instead of Cognito/JWT bearer authentication.
      operationId: getInternalOrderByShippingOrderId
      security:
        - internalServiceAuth: []
      parameters:
        - $ref: '#/components/parameters/InternalServiceSecretHeader'
        - $ref: '#/components/parameters/AcceptHeader'
        - in: path
          name: shippingOrderId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShippingOrder'
        '401':
          description: Missing or invalid internal service headers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Shipping order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


  /orders/items/{trackingId}:
    get:
      tags: [Orders]
      summary: Get a single order item by order item ID
      operationId: getOrderItemByTrackingId
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/AcceptHeader'
        - $ref: '#/components/parameters/ContentTypeHeader'
        - in: path
          name: trackingId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderItem'
        '404':
          description: Not found

  /orders/order-items:
    get:
      tags: [Orders]
      summary: List order items with optional filters and pagination
      operationId: getOrderItems
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/AcceptHeader'
        - $ref: '#/components/parameters/ContentTypeHeader'
        - in: query
          name: shippingOrderId
          schema: { type: string }
        - in: query
          name: userId
          schema: { type: string }
        - in: query
          name: orderStatus
          schema: { type: string }
        - in: query
          name: paymentStatus
          schema: { type: string }
        - in: query
          name: itemStatus
          schema: { type: string }
        - in: query
          name: trackingId
          schema: { type: string }
        - in: query
          name: assignedDriverId
          schema: { type: string }
        - in: query
          name: isFragile
          schema: { type: boolean }
        - in: query
          name: page
          schema: { type: integer, minimum: 0, default: 0 }
        - in: query
          name: size
          schema: { type: integer, minimum: 1, maximum: 200, default: 20 }
        - in: query
          name: sortBy
          schema: { type: string, default: updatedAt }
        - in: query
          name: sortDir
          schema: { type: string, enum: [asc, desc], default: desc }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedOrderItemsResponse'
        '401':
          description: Unauthorized



  /service-zones:
    get:
      tags: [Service Zones]
      summary: List service zones with optional filters
      description: Authenticated endpoint available to any authenticated caller.
      operationId: getServiceZones
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/AcceptHeader'
        - $ref: '#/components/parameters/ContentTypeHeader'
        - in: query
          name: active
          schema: { type: boolean }
        - in: query
          name: city
          schema: { type: string }
        - in: query
          name: station
          schema: { type: string }
      responses:
        '200':
          description: Service zones returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListServiceZonesResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Service Zones]
      summary: Create a new MapleX service zone polygon
      description: Admin-only endpoint. Requires authentication and admin group/role in JWT claims.
      operationId: createServiceZone
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/AcceptHeader'
        - $ref: '#/components/parameters/ContentTypeHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServiceZoneRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateServiceZoneResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (admin-only endpoint)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /service-zones/{id}:
    get:
      tags: [Service Zones]
      summary: Get service zone by ID
      description: Authenticated endpoint available to any authenticated caller.
      operationId: getServiceZoneById
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/AcceptHeader'
        - $ref: '#/components/parameters/ContentTypeHeader'
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Service zone returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceZone'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Service zone not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /service-zones/{id}/active:
    patch:
      tags: [Service Zones]
      summary: Activate or deactivate a service zone
      description: |
        Admin-only endpoint to explicitly set `active` state for a service zone.
        Requires authentication and admin group/role in JWT claims.
      operationId: toggleServiceZoneActive
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/AcceptHeader'
        - $ref: '#/components/parameters/ContentTypeHeader'
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToggleServiceZoneActiveRequest'
            examples:
              deactivate:
                value: { active: false }
      responses:
        '200':
          description: Service zone updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateServiceZoneResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (admin-only endpoint)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Service zone not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /service-zones/check-serviceability:
    post:
      tags: [Service Zones]
      summary: Check whether coordinates are inside any active MapleX service zone
      description: |
        Authenticated serviceability check endpoint available to any authenticated caller.
        Evaluates point-in-polygon against ACTIVE service zones using input coordinates.
      operationId: checkServiceability
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - $ref: '#/components/parameters/AcceptHeader'
        - $ref: '#/components/parameters/ContentTypeHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceabilityCheckRequest'
            examples:
              monctonPoint:
                value:
                  latitude: 46.0878
                  longitude: -64.7782
      responses:
        '200':
          description: Serviceability evaluated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceabilityCheckResponse'
              examples:
                insideZone:
                  value:
                    serviceable: true
                    matchedZoneId: SZ_001
                    matchedZoneName: Moncton Core Service Area
                    city: Moncton
                    station: Moncton
                    reasonCode: INSIDE_SERVICE_ZONE
                    message: Location is within MapleX serviceable area.
                outsideZone:
                  value:
                    serviceable: false
                    matchedZoneId: null
                    matchedZoneName: null
                    city: null
                    station: null
                    reasonCode: OUTSIDE_SERVICE_ZONE
                    message: Location is outside MapleX serviceable area.
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /public/service-zones/check-serviceability:
    post:
      tags: [Public Service Zones]
      summary: Public check whether coordinates are inside any active MapleX service zone
      description: |
        Public unauthenticated serviceability check endpoint for website/homepage visitors.
        Reuses the same service-zone point-in-polygon evaluation logic as the authenticated endpoint.
      operationId: checkServiceabilityPublic
      security: []
      parameters:
        - $ref: '#/components/parameters/AcceptHeader'
        - $ref: '#/components/parameters/ContentTypeHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceabilityCheckRequest'
            examples:
              monctonPoint:
                value:
                  latitude: 46.0878
                  longitude: -64.7782
      responses:
        '200':
          description: Serviceability evaluated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceabilityCheckResponse'
              examples:
                insideZone:
                  value:
                    serviceable: true
                    matchedZoneId: SZ_001
                    matchedZoneName: Moncton Core Service Area
                    city: Moncton
                    station: Moncton
                    reasonCode: INSIDE_SERVICE_ZONE
                    message: Location is within MapleX serviceable area.
                outsideZone:
                  value:
                    serviceable: false
                    matchedZoneId: null
                    matchedZoneName: null
                    city: null
                    station: null
                    reasonCode: OUTSIDE_SERVICE_ZONE
                    message: Location is outside MapleX serviceable area.
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/support-tickets:
    post:
      tags: [Support Tickets]
      summary: Create a customer support ticket
      description: |
        Authenticated client endpoint. The customer user ID and client type are derived from the JWT.
        The service stores only attachment metadata/S3 keys; file upload and presigned URL generation are handled by aws-integration-ms.
      operationId: createSupportTicket
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSupportTicketRequest'
            examples:
              deliveryIssue:
                summary: Delivery issue ticket
                value:
                  category: DELIVERY_ISSUE
                  priority: NORMAL
                  subject: Package was delivered late
                  message: My package was delivered much later than expected. Please check.
                  relatedResource:
                    type: SHIPPING_ORDER
                    shippingOrderId: ORD_123
                    orderItemId: ITEM_123
                    fulfilmentId: FUL_123
                    driverUserId: driver-sub
                    billingAccountId: null
                    invoiceId: null
                    paymentId: null
                    displayLabel: "Order #ORD_123"
                  attachments:
                    - fileName: damaged-package.jpg
                      contentType: image/jpeg
                      sizeBytes: 245881
                      storageKey: support-tickets/TKT_ABC/ATT_001-damaged-package.jpg
      responses:
        '201':
          description: Support ticket created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportTicketDetailResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden, authenticated user is not a client account holder
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags: [Support Tickets]
      summary: List support tickets owned by the authenticated customer
      operationId: getMySupportTickets
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/SupportTicketStatus'
        - in: query
          name: category
          schema:
            $ref: '#/components/schemas/SupportTicketCategory'
        - in: query
          name: relatedResourceType
          schema:
            $ref: '#/components/schemas/RelatedResourceType'
        - in: query
          name: shippingOrderId
          schema: { type: string }
        - in: query
          name: orderItemId
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, minimum: 0, default: 0 }
        - in: query
          name: size
          schema: { type: integer, minimum: 1, maximum: 200, default: 20 }
        - in: query
          name: sort
          description: Sort as `field,direction` or `-field`. Default is `updatedAt,desc`.
          schema: { type: string, example: "updatedAt,desc" }
      responses:
        '200':
          description: Customer ticket summaries returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedSupportTicketSummaryResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/support-tickets/{ticketId}:
    get:
      tags: [Support Tickets]
      summary: Get a customer-visible support ticket conversation
      description: Returns only tickets owned by the JWT user and filters internal admin notes.
      operationId: getMySupportTicketDetail
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - in: path
          name: ticketId
