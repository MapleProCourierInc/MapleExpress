      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - in: path
          name: ticketId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddSupportTicketMessageRequest'
      responses:
        '200':
          description: Full ticket detail returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportTicketDetailResponse'

  /api/v1/admin/support-tickets/{ticketId}/assign:
    patch:
      tags: [Admin Support Tickets]
      summary: Assign a support ticket to an admin user
      operationId: adminAssignSupportTicket
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - in: path
          name: ticketId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignSupportTicketRequest'
      responses:
        '200':
          description: Assignment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSupportTicketActionResponse'

  /api/v1/admin/support-tickets/{ticketId}/resolve:
    patch:
      tags: [Admin Support Tickets]
      summary: Resolve a support ticket
      operationId: adminResolveSupportTicket
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
        - in: path
          name: ticketId
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveSupportTicketRequest'
            examples:
              resolveWithCustomerMessage:
                summary: Resolve and notify customer
                value:
                  resolutionSummary: Reviewed fulfilment timeline and responded to customer.
                  messageToCustomer: We reviewed this issue and have shared feedback with the delivery team.
