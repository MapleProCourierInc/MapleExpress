      responses:
        '200':
          description: Ticket archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSupportTicketActionResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    internalServiceAuth:
      type: apiKey
      in: header
      name: X-Internal-Service-Secret
      description: Shared secret header for trusted service-to-service calls.

  parameters:
    AuthorizationHeader:
      in: header
      name: Authorization
      required: true
      schema:
        type: string
        example: Bearer eyJhbGciOi...
    AcceptHeader:
      in: header
      name: Accept
      required: true
      schema:
        type: string
        default: application/json
    ContentTypeHeader:
      in: header
      name: Content-Type
      required: true
      schema:
        type: string
        default: application/json
    InternalServiceSecretHeader:
      in: header
      name: X-Internal-Service-Secret
      required: true
      schema:
        type: string
        format: password
        example: <secret>

  schemas:
    CreateOrderResponse:
      type: object
      properties:
        shippingOrder:
          $ref: '#/components/schemas/ShippingOrder'

    NeedAdminAttentionRequest:
      type: object
      properties:
        message:
          type: string
          description: Optional message explaining why admin attention is required.

    RemoveOrderItemsRequest:
      type: object
      required: [trackingIds]
      properties:
        trackingIds:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1

    RushPriorityToggleRequest:
      type: object
      required: [rushPriorityRequested]
      properties:
        rushPriorityRequested:
          type: boolean
          description: Whether pricing-payment-ms should apply rush priority pricing.


    CreateServiceZoneRequest:
      type: object
      required: [zoneName, city, station, active, priority, polygon]
      properties:
        zoneName: { type: string, example: Moncton Core Service Area }
        city: { type: string, example: Moncton }
        station: { type: string, example: Moncton }
        active: { type: boolean, example: true }
        priority: { type: integer, example: 1 }
        polygon:
          $ref: '#/components/schemas/ServiceZonePolygon'

    CreateServiceZoneResponse:
      type: object
      properties:
        serviceZone:
          $ref: '#/components/schemas/ServiceZone'

    ServiceZone:
      type: object
      properties:
        id: { type: string, example: SZ_001 }
        zoneName: { type: string }
        city: { type: string }
        station: { type: string }
        active: { type: boolean }
        priority: { type: integer }
        polygon:
          $ref: '#/components/schemas/ServiceZonePolygon'
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdBy: { type: string }
        updatedBy: { type: string }

    ServiceZonePolygon:
      type: object
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [Polygon]
        coordinates:
          type: array
          description: GeoJSON Polygon coordinates in [longitude, latitude] order.
          items:
            type: array
            items:
              type: array
              minItems: 2
              maxItems: 2
              items:
                type: number
      example:
        type: Polygon
        coordinates:
          -
            - [-64.8151, 46.1201]
            - [-64.7602, 46.1450]
            - [-64.7010, 46.1098]
            - [-64.7305, 46.0604]
            - [-64.8008, 46.0720]
            - [-64.8151, 46.1201]


    ListServiceZonesResponse:
      type: object
      properties:
        serviceZones:
          type: array
          items:
            $ref: '#/components/schemas/ServiceZone'

    ToggleServiceZoneActiveRequest:
      type: object
      required: [active]
      properties:
        active:
          type: boolean
          example: false


    PagedCustomerOrderSummaryResponse:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: '#/components/schemas/CustomerOrderSummaryResponse'
        pagination:
          $ref: '#/components/schemas/PaginationMetadata'

    CustomerOrderSummaryResponse:
      type: object
      properties:
        shippingOrderId: { type: string }
        createdAt: { type: string, format: date-time }
        orderStatus: { type: string }
        needsAdminAttention:
          type: boolean
          description: Indicates whether this shipping order requires admin review.
        amount: { type: number }
        numberOfOrderItems: { type: integer }

    CustomerOrderDetailResponse:
      type: object
      properties:
        shippingOrder:
          $ref: '#/components/schemas/ShippingOrder'
        documents:
          type: array
          items:
            $ref: '#/components/schemas/CustomerOrderDocumentResponse'

    CustomerOrderDocumentResponse:
      type: object
      properties:
        documentType:
          type: string
          example: SHIPPING_LABEL
        documentName:
          type: string
          example: shipping-label.pdf
        s3Key:
          type: string
          example: shipping-orders/SO_123/documents/shipping-label.pdf
        presignedUrl:
          type: string
          format: uri

    PagedOrdersResponse:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: '#/components/schemas/ShippingOrder'
        pagination:
          $ref: '#/components/schemas/PaginationMetadata'

    PagedOrderItemsResponse:
      type: object
      properties:
        orderItems:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        pagination:
          $ref: '#/components/schemas/PaginationMetadata'

    PaginationMetadata:
      type: object
      properties:
        page: { type: integer }
        size: { type: integer }
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer }
        sortBy: { type: string }
        sortDir: { type: string }

    ShippingOrder:
      type: object
      required: [shippingOrderId, customerContact, orderItems]
      properties:
        shippingOrderId: { type: string }
        userId:
          type: string
          description: Deprecated in request for POST /orders. Server derives this from JWT sub.
          readOnly: true
        clientUserId:
          type: string
          description: Authenticated client user ID derived from JWT sub.
          readOnly: true
        clientType:
          type: string
          description: Derived from Cognito group (`client_individual` or `client_organization`).
          readOnly: true
        customerContact:
          $ref: '#/components/schemas/ShippingOrderCustomerContact'
        priorityDelivery: { type: boolean }
        needsAdminAttention:
          type: boolean
          description: Indicates whether this shipping order requires admin review.
        orderStatus: { type: string }
        assignedDriverId: { type: string }
        isFragile: { type: boolean }
        paymentStatus: { type: string }
        paymentId: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        aggregatedPricing:
          $ref: '#/components/schemas/ShippingOrderAggregatedPricing'
        notes:
          type: array
          description: Audit notes associated with root-level order changes.
          readOnly: true
          items:
            $ref: '#/components/schemas/ShippingOrderNote'
        orderItems:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'

    ShippingOrderCustomerContact:
      type: object
      properties:
        name: { type: string }
        phone: { type: string }
        email: { type: string }
        taxId: { type: string }

    ShippingOrderNote:
      type: object
      properties:
        changedAt: { type: string, format: date-time }
        changedByUserId: { type: string }
        changedByRoles:
          type: array
          items: { type: string }
        previousStatus: { type: string }
        newStatus: { type: string }
        source: { type: string, example: ORDERS_API }
        message: { type: string }

    ShippingOrderAggregatedPricing:
      type: object
      properties:
        currency: { type: string, example: CAD }
        customQuoteRequired: { type: boolean }
        customQuoteReasons:
          type: array
          items:
            type: string
        charges:
          type: object
          additionalProperties:
            type: number
        totalAmount: { type: number }

    OrderItem:
      type: object
      required: [trackingId, pickup, dropoff]
      properties:
        trackingId: { type: string }
        pickup:
          $ref: '#/components/schemas/OrderItemPickup'
        dropoff:
          $ref: '#/components/schemas/OrderItemDropoff'
        distanceToDelivery: { type: number }
        packageDetails:
          $ref: '#/components/schemas/OrderItemPackageDetails'
        pricing:
          $ref: '#/components/schemas/OrderItemPricing'
        itemStatus: { type: string }
        description: { type: string, description: Customer-provided description of this order item. }
        assignedDriverId: { type: string }
        isFragile: { type: boolean }
        estimatedDeliveryTime: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        specialIncidents:
          type: array
          items:
            $ref: '#/components/schemas/Incident'

    OrderItemPickup:
      type: object
      properties:
        address:
          $ref: '#/components/schemas/Address'
        coordinates:
          $ref: '#/components/schemas/Location'
        time: { type: string, format: date-time }
        notes: { type: string }
        images:
          type: array
          items:
            $ref: '#/components/schemas/Image'

    OrderItemDropoff:
      type: object
      properties:
        address:
          $ref: '#/components/schemas/Address'
        coordinates:
          $ref: '#/components/schemas/Location'
        time: { type: string, format: date-time }
        notes: { type: string }
        images:
          type: array
          items:
            $ref: '#/components/schemas/Image'

    OrderItemPackageDetails:
      type: object
      properties:
        weight: { type: number }
        dimensions:
          $ref: '#/components/schemas/OrderItemPackageDetailsDimensions'
        type: { type: string }
        value: { type: number }
        images:
          type: array
          items:
            $ref: '#/components/schemas/Image'

    OrderItemPackageDetailsDimensions:
      type: object
      properties:
        length: { type: number }
        width: { type: number }
        height: { type: number }

    OrderItemPricing:
      type: object
      properties:
        pricingModelId: { type: string }
        pricingModelVersion: { type: integer }
        pricingTypeApplied: { type: string, enum: [GLOBAL, CUSTOMER_SPECIFIC] }
        ownerIdApplied: { type: string, nullable: true }
        zoneCode: { type: string, example: GLOBAL }
        currency: { type: string, example: CAD }
        customQuoteRequired: { type: boolean }
        customQuoteReason: { type: string, nullable: true }
        charges:
          type: object
          additionalProperties:
            type: number
        calculationContext:
          type: object
          additionalProperties: true
        metadata:
          type: object
          nullable: true
          additionalProperties: true

    Incident:
      type: object
      properties:
        incidentType: { type: string }
        description: { type: string }
        time: { type: string, format: date-time }
        location: { type: string }
        images:
          type: array
          items:
            $ref: '#/components/schemas/IncidentImagesInner'

    IncidentImagesInner:
      type: object
      properties:
        description: { type: string }
        imageUrl: { type: string }
        timestamp: { type: string, format: date-time }

    Image:
      type: object
      properties:
        imageUrl: { type: string }
        timestamp: { type: string, format: date-time }

    Address:
      type: object
      properties:
        fullName: { type: string }
        company: { type: string }
        streetAddress: { type: string }
        addressLine2: { type: string }
        city: { type: string }
        province: { type: string }
        postalCode: { type: string }
        country: { type: string }
        phoneNumber: { type: string }
        deliveryInstructions: { type: string }

    Location:
      type: object
      properties:
        latitude: { type: number }
        longitude: { type: number }


    ServiceabilityCheckRequest:
      type: object
      required: [latitude, longitude]
      properties:
        latitude:
          type: number
          minimum: -90
          maximum: 90
          example: 46.0878
        longitude:
          type: number
          minimum: -180
          maximum: 180
          example: -64.7782

    ServiceabilityCheckResponse:
      type: object
      properties:
        serviceable: { type: boolean }
        matchedZoneId:
          type: string
          nullable: true
        matchedZoneName:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        station:
          type: string
          nullable: true
        reasonCode:
          type: string
          enum: [INSIDE_SERVICE_ZONE, OUTSIDE_SERVICE_ZONE]
        message: { type: string }

    SupportTicketCategory:
      type: string
      enum:
        - GENERAL_QUERY
        - ORDER_QUERY
        - DELIVERY_ISSUE
        - DRIVER_COMPLAINT
        - DAMAGED_PACKAGE
        - MISSED_PICKUP
        - LATE_DELIVERY
        - BILLING_QUERY
        - PAYMENT_QUERY
        - INVOICE_DISPUTE
        - ACCOUNT_QUERY
        - TECHNICAL_ISSUE
        - OTHER

    SupportTicketStatus:
      type: string
      enum: [OPEN, WAITING_FOR_ADMIN, WAITING_FOR_CUSTOMER, IN_PROGRESS, RESOLVED, CLOSED, CANCELLED]

    SupportTicketPriority:
      type: string
      enum: [LOW, NORMAL, HIGH, URGENT]

    SupportTicketVisibility:
      type: string
      enum: [PUBLIC, INTERNAL]

    SupportMessageSenderType:
      type: string
      enum: [CUSTOMER, ADMIN, SYSTEM]

    RelatedResourceType:
      type: string
      enum: [NONE, SHIPPING_ORDER, ORDER_ITEM, FULFILMENT, DRIVER, BILLING_ACCOUNT, INVOICE, PAYMENT]

    CreateSupportTicketRequest:
      type: object
      required: [category, subject, message]
      properties:
        category:
          $ref: '#/components/schemas/SupportTicketCategory'
        priority:
          $ref: '#/components/schemas/SupportTicketPriority'
        subject:
          type: string
          maxLength: 200
        message:
          type: string
          maxLength: 5000
        relatedResource:
          $ref: '#/components/schemas/RelatedResourceRefDto'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/SupportTicketAttachmentRequest'

    AddSupportTicketMessageRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          maxLength: 5000
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/SupportTicketAttachmentRequest'

    SupportTicketAttachmentRequest:
      type: object
      required: [fileName, contentType, storageKey]
      properties:
        fileName: { type: string, example: damaged-package.jpg }
        contentType: { type: string, example: image/jpeg }
        sizeBytes:
          type: integer
          format: int64
          minimum: 0
          example: 245881
        storageKey:
          type: string
          description: S3 key or storage path returned after frontend uploads through aws-integration-ms.
          example: support-tickets/TKT_ABC/ATT_001-damaged-package.jpg

    SupportTicketAttachmentResponse:
      type: object
      properties:
        attachmentId: { type: string, example: ATT_MDR7F8G1 }
        fileName: { type: string }
        contentType: { type: string }
        sizeBytes: { type: integer, format: int64 }
        storageKey: { type: string }
        downloadUrl:
          type: string
          nullable: true
          description: Usually null; frontend should request download URLs from aws-integration-ms.
        uploadedByUserId: { type: string }
        uploadedAt: { type: string, format: date-time }

    RelatedResourceRefDto:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/RelatedResourceType'
        shippingOrderId: { type: string, nullable: true }
        orderItemId: { type: string, nullable: true }
        fulfilmentId: { type: string, nullable: true }
        driverUserId: { type: string, nullable: true }
        billingAccountId: { type: string, nullable: true }
        invoiceId: { type: string, nullable: true }
        paymentId: { type: string, nullable: true }
        displayLabel: { type: string, nullable: true }

    SupportTicketClientSnapshotResponse:
      type: object
      properties:
        fullName: { type: string, nullable: true }
        email: { type: string, nullable: true }
        phoneNumber: { type: string, nullable: true }
        organizationName: { type: string, nullable: true }

    SupportTicketMessageResponse:
      type: object
      properties:
        messageId: { type: string, example: MSG_MDR7F8G1 }
        senderType:
          $ref: '#/components/schemas/SupportMessageSenderType'
        senderUserId: { type: string }
        senderDisplayName: { type: string }
        message: { type: string }
        internalNote:
          type: boolean
          description: Admin-only notes are omitted from customer-facing detail APIs.
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/SupportTicketAttachmentResponse'
        createdAt: { type: string, format: date-time }

    SupportTicketSummaryResponse:
      type: object
      properties:
        ticketId: { type: string, example: TKT_MDR7F8G1 }
        ticketNumber: { type: string, example: MX-TKT-2026-000001 }
        clientUserId: { type: string }
        organizationId: { type: string, nullable: true }
        clientSnapshot:
          $ref: '#/components/schemas/SupportTicketClientSnapshotResponse'
        category:
          $ref: '#/components/schemas/SupportTicketCategory'
        status:
          $ref: '#/components/schemas/SupportTicketStatus'
        priority:
          $ref: '#/components/schemas/SupportTicketPriority'
        visibility:
          $ref: '#/components/schemas/SupportTicketVisibility'
        subject: { type: string }
        latestMessagePreview: { type: string }
        relatedResource:
          $ref: '#/components/schemas/RelatedResourceRefDto'
        assignedAdminUserId: { type: string, nullable: true }
        customerUnread: { type: boolean }
        adminUnread: { type: boolean }
        lastCustomerMessageAt: { type: string, format: date-time, nullable: true }
        lastAdminMessageAt: { type: string, format: date-time, nullable: true }
        lastSystemMessageAt: { type: string, format: date-time, nullable: true }
        resolvedAt: { type: string, format: date-time, nullable: true }
        closedAt: { type: string, format: date-time, nullable: true }
        archived: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    SupportTicketDetailResponse:
      allOf:
        - $ref: '#/components/schemas/SupportTicketSummaryResponse'
        - type: object
          properties:
            messages:
              type: array
              items:
                $ref: '#/components/schemas/SupportTicketMessageResponse'
            resolvedByAdminUserId: { type: string, nullable: true }
            resolutionSummary: { type: string, nullable: true }
            closedByUserId: { type: string, nullable: true }
            archivedAt: { type: string, format: date-time, nullable: true }
            archivedByUserId: { type: string, nullable: true }
            createdByUserId: { type: string }
            updatedByUserId: { type: string }

    PagedSupportTicketSummaryResponse:
      type: object
      properties:
        tickets:
          type: array
          items:
            $ref: '#/components/schemas/SupportTicketSummaryResponse'
        pagination:
          $ref: '#/components/schemas/PaginationMetadata'

    AssignSupportTicketRequest:
      type: object
      properties:
        assignedAdminUserId:
          type: string
          nullable: true
          example: admin-user-sub-123

    AdminUpdateSupportTicketRequest:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/SupportTicketStatus'
        priority:
          $ref: '#/components/schemas/SupportTicketPriority'
        category:
          $ref: '#/components/schemas/SupportTicketCategory'
        assignedAdminUserId:
          type: string
          nullable: true
          example: admin-user-sub-123

    ResolveSupportTicketRequest:
      type: object
      properties:
        resolutionSummary:
          type: string
          maxLength: 5000
        messageToCustomer:
          type: string
          maxLength: 5000

    CloseSupportTicketRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 1000

    ArchiveSupportTicketRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 1000

    CancelSupportTicketRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 1000

    GenericSupportTicketActionResponse:
      type: object
      properties:
        ticketId: { type: string }
        status:
          $ref: '#/components/schemas/SupportTicketStatus'
        message: { type: string }

    ErrorResponse:
      type: object
      properties:
        status: { type: string }
        message: { type: string }
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ErrorResponseErrorsInner'
        errorDetails:
          $ref: '#/components/schemas/ErrorResponseErrorDetails'

    ErrorResponseErrorsInner:
      type: object
      properties:
        field: { type: string }
        message: { type: string }

    ErrorResponseErrorDetails:
      type: object
      properties:
        errorCode: { type: integer }
        errorType: { type: string }
        characteristics:
          type: object
          additionalProperties:
            type: string
