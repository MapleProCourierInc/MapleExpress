                    dueDate: '2026-06-15T23:59:59Z'
                    sentAt: '2026-06-01T02:00:00Z'
                    paidAt: null
                    lineItemCount: 8
                    downloadable: true
                    payable: true
                    overdue: false
                  - invoiceId: INVOICE_NO_DOC
                    invoiceNumber: INVOICE_NO_DOC
                    invoiceDocumentUrl: null
                    invoiceDocumentStatus: NOT_GENERATED
                    amountDue: 0.00
                    currency: CAD
                    status: PAID
                    lineItemCount: 3
                    downloadable: false
                    payable: false
                    overdue: false
                  - invoiceId: INVOICE_UNAVAILABLE
                    invoiceNumber: INVOICE_UNAVAILABLE
                    invoiceDocumentUrl: null
                    invoiceDocumentStatus: UNAVAILABLE
                    amountDue: 25.00
                    currency: CAD
                    status: GENERATED
                    lineItemCount: 1
                    downloadable: false
                    payable: true
                    overdue: false
                page: 0
                size: 20
                totalElements: 3
                totalPages: 1
                first: true
                last: true
                numberOfElements: 3
                sortBy: generatedAt
                sortDir: desc
        '401':
          description: Unauthorized
        '500':
          description: Unexpected server failure
  /billingmanagement/client/unbilled-charges:
    get:
      summary: Get client unbilled charges
      tags: [Client Billing]
      security:
        - bearerAuth: []
      description: |
        Returns a paginated list of only `UNBILLED` charges for the authenticated customer. The billing account is resolved from the JWT `sub`/ownerId; clients must not pass `billingAccountId`.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - in: query
          name: sortBy
          schema: { type: string, default: postedAt, enum: [postedAt, orderDateTime, totalAmount, amount, taxAmount] }
        - $ref: '#/components/parameters/SortDirParam'
        - in: query
          name: fromDate
          description: ISO-8601 date-time. Filters postedAt >= fromDate.
          schema: { type: string, format: date-time, example: '2026-05-01T00:00:00Z' }
        - in: query
          name: toDate
          description: ISO-8601 date-time. Filters postedAt <= toDate.
          schema: { type: string, format: date-time, example: '2026-05-31T23:59:59Z' }
      responses:
        '200':
          description: Client unbilled charge page returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedClientUnbilledChargeResponse'
              example:
                content:
                  - chargeId: CHG_1
                    shippingOrderId: SO_10002
                    paymentId: PAY_20260310_0002
                    chargeType: SHIPPING_ORDER
                    status: UNBILLED
                    amount: 70.00
                    taxAmount: 4.25
                    totalAmount: 74.25
                    currency: CAD
                    orderDateTime: '2026-06-20T10:00:00Z'
                    postedAt: '2026-06-20T10:05:00Z'
                    description: Shipping order SO_10002
                page: 0
                size: 20
                totalElements: 1
                totalPages: 1
                first: true
                last: true
                numberOfElements: 1
                sortBy: postedAt
                sortDir: desc
        '401':
          description: Unauthorized
        '500':
          description: Unexpected server failure
  /billingmanagement/client/billing-payments:
    get:
      summary: Get client billing payments
      tags: [Client Billing]
      security:
        - bearerAuth: []
      description: |
        Returns a paginated billing payment list for the authenticated customer. The billing account is resolved from the JWT `sub`/ownerId; clients must not pass `billingAccountId`. Sensitive gateway/card details are not returned.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - in: query
          name: sortBy
          schema: { type: string, default: paymentDate, enum: [paymentDate, amount, status, paymentMethod] }
        - $ref: '#/components/parameters/SortDirParam'
        - in: query
          name: status
          schema: { type: string, example: SUCCESSFUL }
        - in: query
          name: fromDate
          description: ISO-8601 date-time. Filters paymentDate >= fromDate.
          schema: { type: string, format: date-time, example: '2026-05-01T00:00:00Z' }
        - in: query
          name: toDate
          description: ISO-8601 date-time. Filters paymentDate <= toDate.
          schema: { type: string, format: date-time, example: '2026-05-31T23:59:59Z' }
      responses:
        '200':
          description: Client billing payment page returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedClientBillingPaymentResponse'
              example:
                content:
                  - billingPaymentId: BPAY_1
                    invoiceId: INVOICE_MDR7F8G
                    externalPaymentId: PAY_20260610_0001
                    amount: 100.00
                    currency: CAD
                    paymentMethod: MONERIS
                    status: SUCCESSFUL
                    paymentDate: '2026-06-10T12:00:00Z'
                    notes: Customer payment
                    appliedToLabel: Applied to invoice INVOICE_MDR7F8G
                  - billingPaymentId: BPAY_2
                    invoiceId: null
                    externalPaymentId: CREDIT_INVOICE_MDR7F8G
                    amount: 50.00
                    currency: CAD
                    paymentMethod: CREDIT_BALANCE
                    status: SUCCESSFUL
                    paymentDate: '2026-06-01T01:00:00Z'
                    notes: Credit applied during invoice generation
                    appliedToLabel: Credit applied
                page: 0
                size: 20
                totalElements: 2
                totalPages: 1
                first: true
                last: true
                numberOfElements: 2
                sortBy: paymentDate
                sortDir: desc
        '401':
          description: Unauthorized
        '500':
          description: Unexpected server failure
  /billingmanagement/client/refund-credits:
    get:
      summary: Get client refund credits
      tags: [Client Billing]
      security:
        - bearerAuth: []
      description: |
        Returns a paginated refund credit list for the authenticated customer. The billing account is resolved from the JWT `sub`/ownerId; clients must not pass `billingAccountId`.

        Refund credits are posted from pricing-payment-ms, reduce current unbilled balance first, and move any excess to the account credit balance.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - in: query
          name: sortBy
          schema: { type: string, default: issuedAt, enum: [issuedAt, totalAmount, status, reasonCode, trackingNumber] }
        - $ref: '#/components/parameters/SortDirParam'
        - in: query
