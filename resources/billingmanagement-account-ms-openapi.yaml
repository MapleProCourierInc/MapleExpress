  /billingmanagement/api/v1/public/platform-configuration:
    get:
      summary: Get public MapleX platform configuration
      operationId: getPublicPlatformConfiguration
      tags: [Platform Configuration]
      description: |
        Returns public-facing MapleX company/platform configuration for frontend applications.

        The configuration is backed by the singleton MongoDB document
        `MAPLEX_PLATFORM_CONFIGURATION` in the `platform_configuration` collection.

        Public output intentionally excludes MongoDB version, internal audit identities, disabled
        social profiles, and legal documents that are draft, scheduled, expired, or archived.
        Legal documents are returned only when they are currently effective:
        `status=ACTIVE`, `current=true`, `activeFrom <= now`, and `activeUntil` is absent or in the future.

        This endpoint is public and does not require `admin_super`.
      responses:
        '200':
          description: Public platform configuration returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicPlatformConfigurationResponse'
              example:
                contact:
                  emails:
                    - type: SUPPORT_INQUIRIES
                      displayName: Support Inquiries
                      value: support@maplexpress.ca
                    - type: BILLING_INQUIRIES
                      displayName: Billing Inquiries
                      value: billing@maplexpress.ca
                  phones:
                    - type: CUSTOMER_SUPPORT
                      displayName: Customer Support
                      value: '+1 902 555 0101'
                  location:
                    locationName: MapleX Halifax Office
                    addressLine1: 1 Maple Street
                    addressLine2: Suite 200
                    city: Halifax
                    provinceOrState: NS
                    postalCode: B3J 1A1
                    countryCode: CA
                    mapUrl: https://maps.example.com/maplex-halifax
                    latitude: 44.6488
                    longitude: -63.5752
                socialMediaProfiles:
                  - platform: FACEBOOK
                    displayName: Facebook
                    profileUrl: https://facebook.com/maplexpress
                    handle: MapleX Express
                    displayOrder: 1
                  - platform: INDEED
                    displayName: Indeed
                    profileUrl: https://ca.indeed.com/cmp/maplexpress
                    handle: MapleX Careers
                    displayOrder: 2
                legalDocuments:
                  - legalDocumentId: 0e8bbf80-b2c8-4c0c-90f2-0e3e2a04d5fd
                    documentType: PRIVACY_POLICY
                    displayName: Privacy Policy
                    title: Privacy Policy
                    documentUrl: https://cdn.maplexpress.ca/legal/privacy-policy-v1.pdf
                    policyVersion: 1
                    activeFrom: '2026-07-23T00:00:00Z'
                    activeUntil: null
        '500':
          description: Unexpected server failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /billingmanagement/api/v1/public/platform-configuration/contact:
    get:
      summary: Get public contact configuration
      operationId: getPublicPlatformContactConfiguration
      tags: [Platform Configuration]
      description: |
        Returns configured public emails, configured public phone numbers, and one public
        business location. Email and phone entries are frontend-friendly lists that include
