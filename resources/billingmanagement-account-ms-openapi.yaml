openapi: 3.0.3
info:
  title: Billing Management Account MS API
  version: 1.2.0
  description: Customer/client postpaid billing account CRUD API. BillingAccount is account summary/config only; charges, refund credits, credit-balance ledger entries, invoices, and payments are separate MongoDB documents.
tags:
  - name: Platform Configuration
    description: Public read-only MapleX platform/company configuration APIs for frontend applications.
  - name: Admin Platform Configuration
    description: Secured MapleX platform/company configuration administration APIs. Requires `admin_super` authority.
paths:
  /billingmanagement/billing-account:
    post:
      summary: Create customer billing account
      tags: [Billing Account]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingAccount'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingAccount'
    get:
      summary: List customer billing accounts
      tags: [Billing Account]
      parameters:
        - in: query
          name: ownerId
          schema: { type: string }
        - in: query
          name: ownerType
          schema: { type: string, enum: [INDIVIDUAL, ORGANIZATION] }
        - in: query
          name: billingMode
          schema: { type: string, example: POSTPAID_INVOICE }
        - in: query
          name: status
          schema: { type: string, example: ACTIVE }
        - in: query
          name: email
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BillingAccount'
  /billingmanagement/billing-account/{billingAccountId}:
    get:
      summary: Get billing account by id
      tags: [Billing Account]
      parameters:
        - in: path
          name: billingAccountId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingAccount'
    put:
      summary: Replace billing account by id
      tags: [Billing Account]
      parameters:
        - in: path
          name: billingAccountId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingAccount'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingAccount'
    patch:
      summary: Patch billing account by id
      tags: [Billing Account]
      parameters:
        - in: path
          name: billingAccountId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Updated
    delete:
      summary: Delete billing account by id
      tags: [Billing Account]
      parameters:
        - in: path
          name: billingAccountId
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Deleted
  /billingmanagement/billing-account/orders/shipping-charge:
    post:
      summary: Post shipping order charge to billing account
      deprecated: true
      tags: [Billing Account]
      description: |
        Deprecated direct posting API retained for compatibility.
        Creates an `UNBILLED` BillingAccountCharge ledger entry in `billing_account_charges`.
        It no longer appends to `BillingAccount.orders`.
        Preferred flow: Billing MS consumes `OrderStatusChangeNotification` where
        `newStatus` is `CONFIRMED` and `paymentStatus` is `POSTED_TO_BILLING_ACCOUNT`.
        JWT `sub` must match billingAccount.ownerId.
        Billing account must be `ACTIVE` and `POSTPAID_INVOICE`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostShippingOrderChargeRequest'
            example:
              billingAccountId: ACC_A1B2C3D4
              paymentId: PAY_20260310_0002
              shippingOrderId: SO_10002
              amount: 89.50
              currency: CAD
              orderDateTime: '2026-03-10T23:30:00Z'
              orderStatus: CONFIRMED
              orderStatusReason: Shipping order charge added to monthly billing account
              taxes:
                - taxType: GST
                  taxRate: 5
                  amount: 4.26
              notes: Posted from pricing-payment-ms checkout flow
      responses:
        '200':
          description: Charge posted or already posted idempotent response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostShippingOrderChargeResponse'
        '400':
          description: Invalid request or billing account not eligible
        '401':
          description: Unauthorized
        '403':
          description: Billing account ownership mismatch
        '404':
          description: Billing account not found
  /billingmanagement/billing-account/payments:
    post:
      summary: Post payment received to billing account
      tags: [Billing Account]
      description: |
        Records payment activity toward billing account and updates outstanding dues.
        JWT `sub` must match billingAccount.ownerId.
        Billing account must be `ACTIVE`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostBillingAccountPaymentRequest'
            examples:
              invoicePayment:
                summary: Invoice payment
                value:
                  billingAccountId: ACC_A1B2C3D4
                  paymentId: PAY_20260310_0003
                  amount: 500.00
                  currency: CAD
                  paymentDateTime: '2026-03-10T23:40:05Z'
                  paymentStatus: SUCCESSFUL
                  paymentMethodType: CARD_ONLINE
                  paymentProvider: MONERIS
                  referenceType: INVOICE
                  referenceId: INV_2026_0031
                  invoiceId: INV_2026_0031
                  notes: Customer paid March invoice online
              midCyclePayment:
                summary: Mid-cycle billing account payment
                value:
                  billingAccountId: ACC_A1B2C3D4
                  paymentId: PAY_20260312_0005
                  amount: 200.00
                  currency: CAD
                  paymentStatus: SUCCESSFUL
                  paymentMethodType: CARD_ONLINE
                  paymentProvider: MONERIS
                  referenceType: BILLING_ACCOUNT
                  referenceId: ACC_A1B2C3D4
                  notes: Mid-cycle account payment
              manualPayment:
                summary: Manual payment record
                value:
                  billingAccountId: ACC_A1B2C3D4
                  paymentId: PAY_MANUAL_001
                  amount: 150.00
                  currency: CAD
                  paymentStatus: SETTLED
                  paymentMethodType: MANUAL_SETTLEMENT
                  referenceType: MANUAL
                  referenceId: MANUAL_20260312_01
                  notes: Offline bank transfer confirmed by admin
      responses:
        '200':
          description: Payment posted or idempotently accepted as already posted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostBillingAccountPaymentResponse'
        '400':
          description: Invalid request or billing account not eligible
        '401':
          description: Unauthorized
        '403':
          description: Billing account ownership mismatch
        '404':
          description: Billing account not found
        '409':
          description: Overpayment conflict
  /billingmanagement/invoices/generate-monthly:
    post:
      summary: Generate monthly invoices
      tags: [Invoice]
      description: |
        Generates one invoice per billing account from `UNBILLED` billing account charges and `UNBILLED` refund credits in the target calendar month.
        Generation starts from charges, not from ACTIVE billing accounts, so old postpay charges are still invoiced even if an account is now prepaid or disabled.
        Refund credits are rendered as negative invoice line items and reduce current-period totals.
        Credit balance is auto-applied to the new invoice and a `CREDIT_BALANCE` BillingPayment record is created when credit is used.
        Previous unpaid balances are stored separately as `previousBalance` and are not duplicated as invoice line items.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateMonthlyInvoicesRequest'
      responses:
        '200':
          description: Monthly invoice generation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonthlyInvoiceGenerationResult'
  /billingmanagement/internal/invoices/{invoiceId}:
    get:
      summary: Internal invoice detail lookup
      tags: [Invoice]
      description: Internal endpoint for document-generator-ms to retrieve full invoice data by invoiceId.
      parameters:
        - in: path
          name: invoiceId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Invoice details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingInvoice'
        '404':
          description: Invoice not found
  /billingmanagement/client/billing-dashboard:
    get:
      summary: Get client billing dashboard
      tags: [Client Billing Dashboard]
      security:
        - bearerAuth: []
      description: |
        Returns the authenticated customer's initial billing dashboard payload. The billing account is resolved from the JWT `sub`/ownerId; clients must not pass `billingAccountId`.

        The response includes billing account summary, dashboard totals, latest invoice, recent 5 invoices, recent 5 unbilled charges, recent 5 payments, recent 5 refund credits, recent 5 credit ledger entries, and frontend action flags.

        Full invoice line items are not returned by this master dashboard API. Presigned invoice document URLs are generated best-effort using existing `invoiceS3Key` values. If URL generation fails for an invoice, that invoice returns `invoiceDocumentStatus=UNAVAILABLE` while the dashboard response still succeeds.

        If no billing account exists for the authenticated user, the API returns HTTP 200 with an empty dashboard and `actions.hasBillingAccount=false`.
