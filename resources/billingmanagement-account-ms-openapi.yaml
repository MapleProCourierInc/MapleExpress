  /billingmanagement/client/invoices:
    get:
      summary: Get client invoices
      tags: [Client Billing]
      security:
        - bearerAuth: []
      description: |
        Returns a paginated invoice summary list for the authenticated customer. The billing account is resolved from the JWT `sub`/ownerId; clients must not pass `billingAccountId`.

        Full invoice line items are not returned. `lineItemCount` is returned instead. Presigned invoice document URLs are generated best-effort from `invoiceS3Key`; if generation fails, the response still succeeds and that invoice has `invoiceDocumentStatus=UNAVAILABLE`.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - in: query
          name: sortBy
          schema: { type: string, default: generatedAt, enum: [generatedAt, dueDate, billingPeriodStart, amountDue, totalAmount, status] }
        - $ref: '#/components/parameters/SortDirParam'
        - in: query
          name: status
          schema: { type: string, example: GENERATED }
        - in: query
          name: fromDate
          description: ISO-8601 date-time. Filters generatedAt >= fromDate.
          schema: { type: string, format: date-time, example: '2026-05-01T00:00:00Z' }
        - in: query
          name: toDate
          description: ISO-8601 date-time. Filters generatedAt <= toDate.
          schema: { type: string, format: date-time, example: '2026-05-31T23:59:59Z' }
      responses:
        '200':
          description: Client invoice page returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedClientInvoiceSummaryResponse'
              example:
                content:
                  - invoiceId: INVOICE_MDR7F8G
                    invoiceNumber: INVOICE_MDR7F8G
                    invoiceDocumentUrl: https://presigned-url-example
                    invoiceDocumentStatus: AVAILABLE
                    billingPeriodStart: '2026-05-01T00:00:00Z'
                    billingPeriodEnd: '2026-06-01T00:00:00Z'
                    previousBalance: 200.00
