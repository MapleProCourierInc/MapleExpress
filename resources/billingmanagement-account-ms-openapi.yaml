      properties:
        id:
          type: string
          example: MAPLEX_PLATFORM_CONFIGURATION
        mongoVersion:
          type: integer
          format: int64
          nullable: true
          description: Spring Data MongoDB optimistic-lock version. Different from legal `policyVersion`.
          example: 7
        createdAt:
          type: string
          format: date-time
          nullable: true
          example: '2026-07-23T00:00:00Z'
        updatedAt:
          type: string
          format: date-time
          nullable: true
          example: '2026-07-23T01:15:00Z'
        updatedBy:
          type: string
          nullable: true
          description: Authenticated administrator ID resolved from JWT subject.
          example: Admin_1
        contact:
          $ref: '#/components/schemas/ContactConfigurationResponse'
        socialMediaProfiles:
          type: array
          description: Complete social-media profile list, including disabled profiles.
          items:
            $ref: '#/components/schemas/AdminSocialMediaProfileResponse'
        legalDocuments:
          type: array
          description: Full legal-document history, including drafts, scheduled, active, expired, and archived versions.
