                    subtotal: 428.57
                    taxAmount: 21.43
                    totalAmount: 450.00
                    creditApplied: 100.00
                    amountPaid: 100.00
                    amountDue: 350.00
                    totalAccountBalanceDue: 550.00
                    currency: CAD
